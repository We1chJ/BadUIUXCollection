<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BAD UI UX</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@500&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080808; overflow: hidden; cursor: crosshair; }
  canvas { display: block; position: fixed; inset: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;

let W, H;
let state = 'idle';
let shards = [];
let snapshot = null;
let pulseT = 0;
let idleRaf = null;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function drawScene(clickAlpha = 0) {
  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2;
  const cy = H / 2;
  const titleSize = Math.min(Math.floor(W * 0.13), 120);
  const gap = titleSize * 0.55;

  // Title
  ctx.font = `500 ${titleSize}px 'EB Garamond', serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('BAD UI UX', cx, cy - gap * 0.3);

  // Divider line
  const lineW = Math.min(W * 0.38, 380);
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx - lineW / 2, cy + gap * 0.55);
  ctx.lineTo(cx + lineW / 2, cy + gap * 0.55);
  ctx.stroke();

  // Subtitle
  const subSize = Math.min(Math.floor(W * 0.018), 15);
  ctx.font = `600 ${subSize}px 'Inter', sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.fillText('A COLLECTION OF INTENTIONALLY TERRIBLE DESIGN', cx, cy + gap * 0.95);

  // Pulsing click hint
  pulseT += 0.04;
  const pulse = 0.25 + 0.25 * Math.sin(pulseT);
  ctx.font = `600 10px 'Inter', sans-serif`;
  ctx.fillStyle = `rgba(255,255,255,${pulse})`;
  ctx.fillText('CLICK ANYWHERE TO ENTER', cx, H - 40);

  // Small crosshair at bottom
  const hintY = H - 62;
  ctx.strokeStyle = `rgba(255,255,255,${pulse * 0.6})`;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx - 7, hintY); ctx.lineTo(cx + 7, hintY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, hintY - 7); ctx.lineTo(cx, hintY + 7); ctx.stroke();
}

function idleLoop() {
  if (state !== 'idle') return;
  drawScene();
  idleRaf = requestAnimationFrame(idleLoop);
}

// ── Shatter ────────────────────────────────────────────────────────────────

function buildShards(clickX, clickY) {
  const grid = 55;
  const cols = Math.ceil(W / grid) + 2;
  const rows = Math.ceil(H / grid) + 2;
  const jitter = grid * 0.65;
  const pts = [];

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      pts.push({
        x: (c - 0.5) * grid + (Math.random() - 0.5) * jitter,
        y: (r - 0.5) * grid + (Math.random() - 0.5) * jitter,
      });
    }
  }

  const triangles = [];
  for (let r = 0; r < rows - 1; r++) {
    for (let c = 0; c < cols - 1; c++) {
      const tl = pts[r * cols + c];
      const tr = pts[r * cols + c + 1];
      const bl = pts[(r + 1) * cols + c];
      const br = pts[(r + 1) * cols + c + 1];
      if (Math.random() > 0.5) {
        triangles.push([tl, tr, bl]);
        triangles.push([tr, br, bl]);
      } else {
        triangles.push([tl, tr, br]);
        triangles.push([tl, br, bl]);
      }
    }
  }

  return triangles.map(verts => {
    const cx = (verts[0].x + verts[1].x + verts[2].x) / 3;
    const cy = (verts[0].y + verts[1].y + verts[2].y) / 3;
    const angle = Math.atan2(cy - clickY, cx - clickX);
    const dist = Math.hypot(cy - clickY, cx - clickX) + 1;
    const nearBoost = Math.min(600 / dist, 12);
    const speed = 2 + Math.random() * 7 + nearBoost;

    return {
      verts,
      cx, cy,
      dx: 0, dy: 0,
      vx: Math.cos(angle) * speed * (0.5 + Math.random() * 0.8),
      vy: Math.sin(angle) * speed * (0.5 + Math.random() * 0.8) - Math.random() * 3,
      rot: 0,
      rotV: (Math.random() - 0.5) * 0.08,
      opacity: 1,
    };
  });
}

function drawShard(s) {
  ctx.save();
  ctx.globalAlpha = Math.max(0, s.opacity);

  // transform: rotate around centroid, then offset
  ctx.translate(s.cx + s.dx, s.cy + s.dy);
  ctx.rotate(s.rot);
  ctx.translate(-s.cx, -s.cy);

  ctx.beginPath();
  ctx.moveTo(s.verts[0].x, s.verts[0].y);
  ctx.lineTo(s.verts[1].x, s.verts[1].y);
  ctx.lineTo(s.verts[2].x, s.verts[2].y);
  ctx.closePath();
  ctx.clip();

  // draw snapshot scaled to CSS dimensions
  ctx.drawImage(snapshot, 0, 0, snapshot.width, snapshot.height, 0, 0, W, H);

  ctx.restore();
}

function shatterLoop() {
  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, W, H);

  let alive = false;
  shards.forEach(s => {
    s.vy += 0.45;
    s.dx += s.vx;
    s.dy += s.vy;
    s.rot += s.rotV;
    s.opacity -= 0.011;
    if (s.opacity > 0) { alive = true; drawShard(s); }
  });

  if (!alive) { window.location.href = './index.html'; return; }
  requestAnimationFrame(shatterLoop);
}

// ── Boot ───────────────────────────────────────────────────────────────────

function start() {
  resize();
  idleLoop();

  canvas.addEventListener('click', e => {
    if (state !== 'idle') return;
    state = 'shattering';
    cancelAnimationFrame(idleRaf);

    // snapshot before shattering
    snapshot = document.createElement('canvas');
    snapshot.width = canvas.width;
    snapshot.height = canvas.height;
    snapshot.getContext('2d').drawImage(canvas, 0, 0);

    shards = buildShards(e.clientX, e.clientY);
    requestAnimationFrame(shatterLoop);
  });
}

document.fonts.ready.then(start);
</script>
</body>
</html>
