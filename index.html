<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BAD UI UX</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@500&family=Inter:wght@600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f9f9f9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Inter, sans-serif;
  }

  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
    padding: 24px;
    text-align: center;
  }

  .title {
    font-family: 'EB Garamond', serif;
    font-weight: 500;
    font-size: clamp(64px, 12vw, 140px);
    line-height: 1;
    letter-spacing: -0.03em;
    color: #000;
  }

  .buttons {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    font-family: Inter, sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    color: #000;
    background: #fff;
    border: 2px solid #000;
    box-shadow: 3px 3px 0 #000;
    padding: 16px 40px;
    cursor: pointer;
    width: 220px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }

  .btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 #000;
  }

  .btn:active {
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0 #000;
  }

  .btn.filled {
    background: #000;
    color: #fff;
  }
</style>
</head>
<body>

<div class="center">
  <h1 class="title">BAD UI UX</h1>

  <div class="buttons">
    <a class="btn" href="./gallery.html">Pick One</a>
    <button class="btn filled" onclick="goRandom()">Random</button>
  </div>
</div>

<script src="./pieces/registry.js"></script>
<script>
  function goRandom() {
    const live = (window.PIECES || []).filter(p => p.status === 'live');
    if (live.length) {
      const pick = live[Math.floor(Math.random() * live.length)];
      window.location.href = './pieces/' + pick.id + '/';
    } else {
      window.location.href = './gallery.html';
    }
  }
</script>

</body>
</html>
