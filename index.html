<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BAD UI UX</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@500&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Inter, sans-serif;
    cursor: none;
    overflow: hidden;
  }

  /* ── Canvases ── */
  #dither-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  #damage, #shatter {
    position: fixed;
    inset: 0;
    pointer-events: none;
  }
  #damage  { z-index: 50;  } /* persistent black wall traces */
  #shatter { z-index: 100; } /* flying shards */

  /* ── Vignettes ── */
  #vignette-outer, #vignette-center {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }
  #vignette-outer  { background: radial-gradient(circle, rgba(0,0,0,0) 55%, rgba(0,0,0,0.95) 100%); }
  #vignette-center { background: radial-gradient(circle, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0) 55%); }

  /* ── Target cursor ── */
  #target-cursor {
    position: fixed;
    top: 0; left: 0;
    width: 0; height: 0;
    pointer-events: none;
    z-index: 9999;
    will-change: transform;
    mix-blend-mode: difference;
  }
  #cursor-dot {
    position: absolute;
    top: 50%; left: 50%;
    width: 4px; height: 4px;
    background: #fff;
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  .tc-corner {
    position: absolute;
    top: 50%; left: 50%;
    width: 12px; height: 12px;
    will-change: transform;
  }
  .tc-corner.tl { border-top: 3px solid #fff; border-left:  3px solid #fff; }
  .tc-corner.tr { border-top: 3px solid #fff; border-right: 3px solid #fff; }
  .tc-corner.br { border-bottom: 3px solid #fff; border-right: 3px solid #fff; }
  .tc-corner.bl { border-bottom: 3px solid #fff; border-left:  3px solid #fff; }

  /* ── Corner readouts ── */
  #coords, #piece-count {
    position: fixed;
    bottom: 20px;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.05em;
    pointer-events: none;
    z-index: 9998;
    user-select: none;
  }
  #coords       { left: 24px;  color: #444; }
  #piece-count  { right: 24px; color: #444; }

  /* ── Glass footer bar ── */
  #footer-bar {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9000;
    display: flex;
    align-items: center;
    gap: 22px;
    padding: 14px 30px;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 999px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
    font-size: 14px;
  }
  #footer-bar a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #fff;
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: opacity 0.15s ease;
  }
  #footer-bar a:hover { opacity: 0.65; }
  #footer-bar svg { width: 18px; height: 18px; }
  .footer-sep { width: 1px; height: 18px; background: rgba(255, 255, 255, 0.18); }

  /* ── Content ── */
  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
    padding: 24px;
    text-align: center;
    position: relative;
    z-index: 10;
  }
  .title {
    font-family: 'EB Garamond', serif;
    font-weight: 500;
    font-size: clamp(64px, 12vw, 140px);
    line-height: 1;
    letter-spacing: -0.03em;
    color: #fff;
  }
  .subtitle {
    font-size: 11px;
    font-weight: 400;
    color: #666;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: -32px;
  }
  .buttons {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    font-family: Inter, sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    color: #fff;
    background: transparent;
    border: 2px solid #fff;
    box-shadow: 3px 3px 0 #fff;
    padding: 16px 40px;
    cursor: none;
    width: 220px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }
  .btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #fff; }
  .btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 #fff; }
  .btn.filled { background: #fff; color: #000; }
</style>
</head>

  </a>
  <span class="footer-sep"></span>

</div>

<div class="center">
  <h1 class="title">BAD UI UX</h1>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="./pieces/registry.js"></script>
<script>
// ── Dither background (WebGL2) ────────────────────────────────────────────────
(function () {
  const canvas = document.getElementById('dither-bg');
  const gl = canvas.getContext('webgl2', { preserveDrawingBuffer: true });
  if (!gl) return;

  const VS = `#version 300 es
in vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

  const FS = `#version 300 es
precision highp float;
out vec4 fragColor;
uniform vec2  resolution;
uniform float time;
uniform float waveSpeed;
uniform float waveFrequency;
uniform float waveAmplitude;
uniform vec3  waveColor;
uniform vec2  mousePos;
uniform int   enableMouse;
uniform float mouseRadius;
uniform float colorNum;
uniform float pixelSize;

vec4 mod289v(vec4 x){return x-floor(x*(1./289.))*289.;}
vec4 permute(vec4 x){return mod289v(((x*34.)+1.)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float cnoise(vec2 P){
  vec4 Pi=floor(P.xyxy)+vec4(0.,0.,1.,1.);
  vec4 Pf=fract(P.xyxy)-vec4(0.,0.,1.,1.);
  Pi=mod289v(Pi);
  vec4 ix=Pi.xzxz,iy=Pi.yyww,fx=Pf.xzxz,fy=Pf.yyww;
  vec4 i=permute(permute(ix)+iy);
  vec4 gx=fract(i*(1./41.))*2.-1.,gy=abs(gx)-.5,tx=floor(gx+.5);
  gx-=tx;
  vec2 g00=vec2(gx.x,gy.x),g10=vec2(gx.y,gy.y),g01=vec2(gx.z,gy.z),g11=vec2(gx.w,gy.w);
  vec4 norm=taylorInvSqrt(vec4(dot(g00,g00),dot(g01,g01),dot(g10,g10),dot(g11,g11)));
  g00*=norm.x;g01*=norm.y;g10*=norm.z;g11*=norm.w;
  float n00=dot(g00,vec2(fx.x,fy.x)),n10=dot(g10,vec2(fx.y,fy.y)),
        n01=dot(g01,vec2(fx.z,fy.z)),n11=dot(g11,vec2(fx.w,fy.w));
  vec2 fade_xy=Pf.xy*Pf.xy*Pf.xy*(Pf.xy*(Pf.xy*6.-15.)+10.);
  vec2 nx=mix(vec2(n00,n01),vec2(n10,n11),fade_xy.x);
  return 2.3*mix(nx.x,nx.y,fade_xy.y);
}
float fbm(vec2 p){
  float v=0.,a=1.,f=waveFrequency;
  for(int i=0;i<4;i++){v+=a*abs(cnoise(p));p*=f;a*=waveAmplitude;}
  return v;
}
float pattern(vec2 p){vec2 p2=p-time*waveSpeed;return fbm(p+fbm(p2));}

const float B[64]=float[64](
   0./64.,48./64.,12./64.,60./64., 3./64.,51./64.,15./64.,63./64.,
  32./64.,16./64.,44./64.,28./64.,35./64.,19./64.,47./64.,31./64.,
   8./64.,56./64., 4./64.,52./64.,11./64.,59./64., 7./64.,55./64.,
  40./64.,24./64.,36./64.,20./64.,43./64.,27./64.,39./64.,23./64.,
   2./64.,50./64.,14./64.,62./64., 1./64.,49./64.,13./64.,61./64.,
  34./64.,18./64.,46./64.,30./64.,33./64.,17./64.,45./64.,29./64.,
  10./64.,58./64., 6./64.,54./64., 9./64.,57./64., 5./64.,53./64.,
  42./64.,26./64.,38./64.,22./64.,41./64.,25./64.,37./64.,21./64.
);
vec3 dither(vec2 uv,vec3 color){
  vec2 sc=floor(uv*resolution/pixelSize);
  int x=int(mod(sc.x,8.)),y=int(mod(sc.y,8.));
  float t=B[y*8+x]-0.25,step=1./(colorNum-1.);
  color+=t*step;
  color=clamp(color-0.2,0.,1.);
  return floor(color*(colorNum-1.)+0.5)/(colorNum-1.);
}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 nps=vec2(pixelSize)/resolution;
  vec2 uvP=nps*floor(uv/nps);
  vec2 wuv=uvP-0.5;
  wuv.x*=resolution.x/resolution.y;
  float f=pattern(wuv);
  if(enableMouse==1){
    vec2 wuvF=uv-0.5;
    wuvF.x*=resolution.x/resolution.y;
    vec2 mNDC=(mousePos/resolution.xy-0.5)*vec2(1.,-1.);
    mNDC.x*=resolution.x/resolution.y;
    f-=0.5*(1.-smoothstep(0.,mouseRadius,length(wuvF-mNDC)));
  }
  vec3 col=mix(vec3(0.),waveColor,f);
  col=dither(uv,col);
  fragColor=vec4(col,1.);
}
`;

  function mkShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
    return s;
  }

  const prog = gl.createProgram();
  gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, VS));
  gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(prog));
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  const U = name => gl.getUniformLocation(prog, name);
  const uRes=U('resolution'), uTime=U('time'), uWSpd=U('waveSpeed'),
        uWFrq=U('waveFrequency'), uWAmp=U('waveAmplitude'), uWCol=U('waveColor'),
        uMPos=U('mousePos'), uMEn=U('enableMouse'), uMRad=U('mouseRadius'),
        uCNum=U('colorNum'), uPSz=U('pixelSize');

  gl.uniform1f(uWSpd,  0.05);
  gl.uniform1f(uWFrq,  3.0);
  gl.uniform1f(uWAmp,  0.3);
  gl.uniform3f(uWCol,  0.502, 0.502, 0.502);
  gl.uniform1i(uMEn,   1);
  gl.uniform1f(uMRad,  0.3);
  gl.uniform1f(uCNum,  2.7);
  gl.uniform1f(uPSz,   3.0);

  let mx = 0, my = 0;
  window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

  function resize() {
    const dpr = devicePixelRatio || 1;
    const W = innerWidth * dpr | 0, H = innerHeight * dpr | 0;
    canvas.width = W; canvas.height = H;
    canvas.style.width = innerWidth + 'px'; canvas.style.height = innerHeight + 'px';
    gl.viewport(0, 0, W, H);
    gl.uniform2f(uRes, W, H);
  }

  const t0 = performance.now();
  function draw() {
    gl.uniform1f(uTime, (performance.now() - t0) / 1000);
    const dpr = devicePixelRatio || 1;
    gl.uniform2f(uMPos, mx * dpr, my * dpr);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(draw);
  }

  resize();
  window.addEventListener('resize', resize);
  requestAnimationFrame(draw);
})();

// ── Piece count ──────────────────────────────────────────────────────────────
const total = (window.PIECES || []).length;
const live  = (window.PIECES || []).filter(p => p.status === 'live').length;
document.getElementById('piece-count').textContent = live + ' / ' + total + ' live';

function goRandom() {
  const livePieces = (window.PIECES || []).filter(p => p.status === 'live');
  if (livePieces.length) {
    const pick = livePieces[Math.floor(Math.random() * livePieces.length)];
    window.location.href = './pieces/' + pick.id + '/';
  } else {
    window.location.href = './gallery.html';
  }
}

// ── TargetCursor ─────────────────────────────────────────────────────────────
const CORNER_SIZE = 12, BORDER_W = 3, SPIN_DUR = 2, HOVER_DUR = 0.2;
const cursorEl  = document.getElementById('target-cursor');
const dotEl     = document.getElementById('cursor-dot');
const corners   = Array.from(document.querySelectorAll('.tc-corner'));
const initPos   = [
  { x: -CORNER_SIZE * 1.5, y: -CORNER_SIZE * 1.5 },
  { x:  CORNER_SIZE * 0.5, y: -CORNER_SIZE * 1.5 },
  { x:  CORNER_SIZE * 0.5, y:  CORNER_SIZE * 0.5 },
  { x: -CORNER_SIZE * 1.5, y:  CORNER_SIZE * 0.5 },
];

gsap.set(cursorEl, { xPercent: -50, yPercent: -50, x: innerWidth / 2, y: innerHeight / 2 });
corners.forEach((c, i) => gsap.set(c, initPos[i]));

let spinTl = gsap.timeline({ repeat: -1 })
  .to(cursorEl, { rotation: '+=360', duration: SPIN_DUR, ease: 'none' });

const coordsEl = document.getElementById('coords');
window.addEventListener('mousemove', e => {
  gsap.to(cursorEl, { x: e.clientX, y: e.clientY, duration: 0.1, ease: 'power3.out' });
  coordsEl.textContent = 'X: ' + e.clientX + '   Y: ' + e.clientY;
});
window.addEventListener('mousedown', () => {
  gsap.to(dotEl,    { scale: 0.5,  duration: 0.15 });
  gsap.to(cursorEl, { scale: 0.85, duration: 0.15 });
});
window.addEventListener('mouseup', () => {
  gsap.to(dotEl,    { scale: 1, duration: 0.25 });
  gsap.to(cursorEl, { scale: 1, duration: 0.2  });
});

let activeTarget = null, currentLeave = null, resumeTimeout = null;
let isActive = false, targetCornerPos = null;
const activeStr = { current: 0 };

const ticker = () => {
  if (!targetCornerPos || !isActive || activeStr.current === 0) return;
  const cx = gsap.getProperty(cursorEl, 'x');
  const cy = gsap.getProperty(cursorEl, 'y');
  corners.forEach((corner, i) => {
    const tx = targetCornerPos[i].x - cx, ty = targetCornerPos[i].y - cy;
    const cur_x = gsap.getProperty(corner, 'x'), cur_y = gsap.getProperty(corner, 'y');
    const dur = activeStr.current >= 0.99 ? 0.2 : 0.05;
    gsap.to(corner, { x: cur_x + (tx - cur_x) * activeStr.current, y: cur_y + (ty - cur_y) * activeStr.current, duration: dur, ease: 'power1.out', overwrite: 'auto' });
  });
};

window.addEventListener('mouseover', e => {
  const target = e.target.closest('.cursor-target');
  if (!target || target === activeTarget) return;
  if (activeTarget && currentLeave) activeTarget.removeEventListener('mouseleave', currentLeave);
  if (resumeTimeout) { clearTimeout(resumeTimeout); resumeTimeout = null; }

  activeTarget = target;
  isActive = true;
  spinTl.pause();
  gsap.killTweensOf(cursorEl, 'rotation');
  gsap.set(cursorEl, { rotation: 0 });

  const rect = target.getBoundingClientRect();
  const cx = gsap.getProperty(cursorEl, 'x'), cy = gsap.getProperty(cursorEl, 'y');
  targetCornerPos = [
    { x: rect.left  - BORDER_W,              y: rect.top    - BORDER_W },
    { x: rect.right + BORDER_W - CORNER_SIZE, y: rect.top    - BORDER_W },
    { x: rect.right + BORDER_W - CORNER_SIZE, y: rect.bottom + BORDER_W - CORNER_SIZE },
    { x: rect.left  - BORDER_W,              y: rect.bottom + BORDER_W - CORNER_SIZE },
  ];

  gsap.ticker.add(ticker);
  gsap.to(activeStr, { current: 1, duration: HOVER_DUR, ease: 'power2.out' });
  corners.forEach((c, i) => gsap.to(c, { x: targetCornerPos[i].x - cx, y: targetCornerPos[i].y - cy, duration: 0.2, ease: 'power2.out' }));

  currentLeave = () => {
    gsap.ticker.remove(ticker);
    isActive = false; targetCornerPos = null;
    gsap.set(activeStr, { current: 0 });
    activeTarget = null;
    corners.forEach((c, i) => gsap.to(c, { ...initPos[i], duration: 0.3, ease: 'power3.out' }));
    resumeTimeout = setTimeout(() => {
      if (!activeTarget) {
        spinTl.kill();
        spinTl = gsap.timeline({ repeat: -1 }).to(cursorEl, { rotation: '+=360', duration: SPIN_DUR, ease: 'none' });
      }
      resumeTimeout = null;
    }, 50);
    target.removeEventListener('mouseleave', currentLeave);
    currentLeave = null;
  };
  target.addEventListener('mouseleave', currentLeave);
});

// ── Shatter ───────────────────────────────────────────────────────────────────
const dmgCanvas = document.getElementById('damage');
const dmgCtx    = dmgCanvas.getContext('2d');
const canvas    = document.getElementById('shatter');
const ctx       = canvas.getContext('2d');
const dpr       = window.devicePixelRatio || 1;
let W, H, sourceCanvas;

function resize() {
  W = innerWidth; H = innerHeight;
  [canvas, dmgCanvas].forEach(c => {
    c.width  = W * dpr; c.height = H * dpr;
    c.style.width = W + 'px'; c.style.height = H + 'px';
  });
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  dmgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// Snapshot the actual rendered page (dither bg + text + buttons) so shards
// carry the real HTML. Returns a Promise<canvas>.
function buildSource() {
  return html2canvas(document.body, {
    backgroundColor: '#000',
    scale: dpr,
    logging: false,
    ignoreElements: el =>
      el.id === 'damage' || el.id === 'shatter' ||
      el.id === 'target-cursor' || el.id === 'coords' || el.id === 'piece-count',
  });
}

// Star-burst impact of varied rectangles local to a click point.
function buildShards(clickX, clickY) {
  const R       = 38 + Math.random() * 34;          // randomized impact size
  const spikes  = 5 + (Math.random() * 3 | 0);       // star points (5-7)
  const phase   = Math.random() * Math.PI * 2;
  const starAmp = 0.28 + Math.random() * 0.16;       // jaggedness of the star edge
  const pA = Math.random() * 6.283, pB = Math.random() * 6.283;
  // jagged star radius at a given angle, with organic noise so it's not a clean curve
  const edgeR = a =>
    R * (1 - starAmp + starAmp * (0.5 + 0.5 * Math.cos((a + phase) * spikes)))
      * (1 + 0.18 * Math.sin(a * 3 + pA) + 0.12 * Math.sin(a * 7 + pB));

  const span = R * 2.6;
  const ox = clickX - span / 2;
  const oy = clickY - span / 2;

  // Non-uniform column/row edges → rectangles of varied dimensions, no gaps
  const xs = [0];
  while (xs[xs.length - 1] < span) xs.push(xs[xs.length - 1] + 14 + Math.random() * 26);
  const ys = [0];
  while (ys[ys.length - 1] < span) ys.push(ys[ys.length - 1] + 12 + Math.random() * 22);

  const rects = [];
  for (let r = 0; r < ys.length - 1; r++) {
    for (let c = 0; c < xs.length - 1; c++) {
      const x0 = ox + xs[c], x1 = ox + xs[c + 1];
      const y0 = oy + ys[r], y1 = oy + ys[r + 1];
      const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
      const ang = Math.atan2(cy - clickY, cx - clickX);
      // ragged edge: random per-rect threshold so the outline frays
      if (Math.hypot(cx - clickX, cy - clickY) > edgeR(ang) * (0.8 + Math.random() * 0.35)) continue;
      rects.push([
        { x: x0, y: y0 }, { x: x1, y: y0 },
        { x: x1, y: y1 }, { x: x0, y: y1 },
      ]);
    }
  }
  return rects;
}

function spawnShatter(clickX, clickY) {
  if (!sourceCanvas) return;
  const rects = buildShards(clickX, clickY);
  rects.forEach(verts => {
    const cx  = verts.reduce((s, v) => s + v.x, 0) / verts.length;
    const cy  = verts.reduce((s, v) => s + v.y, 0) / verts.length;

    // Paint the impact black on the damage canvas (persistent wall hole)
    dmgCtx.beginPath();
    dmgCtx.moveTo(verts[0].x, verts[0].y);
    for (let i = 1; i < verts.length; i++) dmgCtx.lineTo(verts[i].x, verts[i].y);
    dmgCtx.closePath();
    dmgCtx.fillStyle = '#0a0a0a';
    dmgCtx.fill();
    dmgCtx.strokeStyle = 'rgba(255,255,255,0.18)';
    dmgCtx.lineWidth   = 0.75;
    dmgCtx.stroke();

    // Pieces only "slightly shatter out" — gentle outward pop, then gravity
    const ang  = Math.atan2(cy - clickY, cx - clickX);
    const dist = Math.hypot(cy - clickY, cx - clickX) + 1;
    const spd  = 1 + Math.random() * 4 + Math.min(40 / dist, 5);
    shards.push({
      verts, cx, cy,
      dx: 0, dy: 0,
      vx: Math.cos(ang) * spd * (0.4 + Math.random() * 0.7),
      vy: Math.sin(ang) * spd * (0.4 + Math.random() * 0.7) - Math.random() * 1.5,
      rot: 0,
      rotV: (Math.random() - 0.5) * 0.06,
    });
  });
}

function drawShard(s) {
  ctx.save();
  ctx.globalAlpha = 1;
  ctx.translate(s.cx + s.dx, s.cy + s.dy);
  ctx.rotate(s.rot);
  ctx.translate(-s.cx, -s.cy);

  ctx.beginPath();
  ctx.moveTo(s.verts[0].x, s.verts[0].y);
  for (let i = 1; i < s.verts.length; i++) ctx.lineTo(s.verts[i].x, s.verts[i].y);
  ctx.closePath();
  ctx.clip();

  // Paste the page snapshot into this shard's clip region
  ctx.drawImage(sourceCanvas, 0, 0, sourceCanvas.width, sourceCanvas.height, 0, 0, W, H);

  // Glass-edge highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth   = 1;
  ctx.stroke();

  ctx.restore();
}

// Bake a settled shard permanently onto the damage canvas
function settleShard(s) {
  dmgCtx.save();
  dmgCtx.globalAlpha = 1;
  dmgCtx.translate(s.cx + s.dx, s.cy + s.dy);
  dmgCtx.rotate(s.rot);
  dmgCtx.translate(-s.cx, -s.cy);
  dmgCtx.beginPath();
  dmgCtx.moveTo(s.verts[0].x, s.verts[0].y);
  for (let i = 1; i < s.verts.length; i++) dmgCtx.lineTo(s.verts[i].x, s.verts[i].y);
  dmgCtx.closePath();
  dmgCtx.clip();
  dmgCtx.drawImage(sourceCanvas, 0, 0, sourceCanvas.width, sourceCanvas.height, 0, 0, W, H);
  dmgCtx.strokeStyle = 'rgba(255,255,255,0.6)';
  dmgCtx.lineWidth   = 1;
  dmgCtx.stroke();
  dmgCtx.restore();
}

let shards = [], animating = false;

function loop() {
  ctx.clearRect(0, 0, W, H);
  const flying = [];
  shards.forEach(s => {
    s.vy  += 0.35;
    s.dx  += s.vx;
    s.dy  += s.vy;
    s.rot += s.rotV;
    if (s.cy + s.dy >= H - 8) {
      s.dy = H - 8 - s.cy;
      settleShard(s);        // bake onto damage canvas, gone from flying list
    } else {
      flying.push(s);
      drawShard(s);
    }
  });
  shards = flying;
  if (shards.length) requestAnimationFrame(loop);
  else animating = false;
}

document.addEventListener('click', e => {
  if (e.target.closest('#footer-bar')) return;  // don't shatter the footer
  spawnShatter(e.clientX, e.clientY);
  if (!animating) { animating = true; requestAnimationFrame(loop); }
});

// ── Boot ─────────────────────────────────────────────────────────────────────
resize();
document.fonts.ready.then(() => {
  // Delay so the dither has rendered a frame and layout is fully painted
  setTimeout(() => { buildSource().then(c => { sourceCanvas = c; }); }, 400);
});
// Re-snapshot on resize so shards stay aligned with the current layout
window.addEventListener('resize', () => {
  setTimeout(() => { buildSource().then(c => { sourceCanvas = c; }); }, 400);
});
</script>
</body>
</html>
