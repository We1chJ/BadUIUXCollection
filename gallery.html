<script>
const pieces = window.PIECES;
let searchQuery = '';
let displayedPieces = [...pieces];

function fmtDate(iso) {
  if (!iso) return '';
  const [y, m] = iso.split('-').map(Number);
  return new Date(y, m - 1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

// ── Spring tilt effect ────────────────────────────────────────────────────────
function bindTilt(el) {
  const AMP = 10, SCALE_ON = 1.04;
  let tRX = 0, tRY = 0, tS = 1;
  let cRX = 0, cRY = 0, cS = 1;
  let raf = null;

  function tick() {
    cRX += (tRX - cRX) * 0.14;
    cRY += (tRY - cRY) * 0.14;
    cS  += (tS  - cS)  * 0.14;
    el.style.transform = `perspective(700px) rotateX(${cRX}deg) rotateY(${cRY}deg) scale(${cS})`;
    raf = (Math.abs(tRX - cRX) + Math.abs(tRY - cRY) > 0.04 || Math.abs(tS - cS) > 0.001)
      ? requestAnimationFrame(tick) : null;
  }

  el.addEventListener('mousemove', e => {
    const r = el.getBoundingClientRect();
    tRX = -((e.clientY - r.top  - r.height / 2) / (r.height / 2)) * AMP;
    tRY =  ((e.clientX - r.left - r.width  / 2) / (r.width  / 2)) * AMP;
    tS = SCALE_ON;
    if (!raf) raf = requestAnimationFrame(tick);
  });

  el.addEventListener('mouseleave', () => {
    tRX = 0; tRY = 0; tS = 1;
    if (!raf) raf = requestAnimationFrame(tick);
  });
}

// ── Scale iframes to fill preview width ──────────────────────────────────────
function scaleIframes() {
  document.querySelectorAll('.card-preview').forEach(preview => {
    const iframe = preview.querySelector('iframe');
    if (!iframe) return;
    iframe.style.transform = `scale(${preview.clientWidth / 900})`;
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function filterAndRender() {
  let filtered = [...pieces];
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(p =>
      p.title.toLowerCase().includes(q) || p.sin.toLowerCase().includes(q)
    );
  }
  displayedPieces = filtered;
  renderGrid(filtered);
}

function renderGrid(items) {
  const grid  = document.getElementById('cardGrid');
  const empty = document.getElementById('emptyState');
  const countEl = document.getElementById('resultCount');
  grid.innerHTML = '';

  if (items.length === 0) {
    grid.classList.add('hidden');
    empty.classList.remove('hidden'); empty.classList.add('flex');
    countEl.textContent = '0 pieces';
    return;
  }

  grid.classList.remove('hidden');
  empty.classList.add('hidden'); empty.classList.remove('flex');
  countEl.textContent = `${items.length} piece${items.length !== 1 ? 's' : ''}`;

  items.forEach(piece => {
    const card = document.createElement('div');
    card.className = 'tilt-wrap';
    card.dataset.id = piece.id;

    const datePart   = fmtDate(piece.dateAdded);
    const creditPart = piece.credit ? `made by ${piece.credit}` : '';
    const meta = [datePart, creditPart].filter(Boolean).join(' · ');

    card.innerHTML = `
      <div class="card-preview">
        <iframe src="./pieces/${piece.id}/" scrolling="no" tabindex="-1" loading="lazy" sandbox="allow-same-origin" title="${piece.title} preview"></iframe>
      </div>
      <div class="card-info">
        <div class="card-title">${piece.title}</div>
        ${meta ? `<div class="card-meta">${meta}</div>` : ''}
      </div>`;

    card.addEventListener('click', () => window.location.href = `./pieces/${piece.id}/`);
    bindTilt(card);
    grid.appendChild(card);
  });

  requestAnimationFrame(scaleIframes);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  filterAndRender();
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  document.getElementById('toastText').textContent = msg;
  el.classList.remove('hidden', 'hiding');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    el.classList.add('hiding');
    setTimeout(() => el.classList.add('hidden'), 200);
  }, 2500);
}

// ── Init ─────────────────────────────────────────────────────────────────────
filterAndRender();
window.addEventListener('resize', scaleIframes);

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  filterAndRender();
});

document.getElementById('shuffleBtn').addEventListener('click', () => {
  if (!displayedPieces.length) return;
  const pick = displayedPieces[Math.floor(Math.random() * displayedPieces.length)];
  window.location.href = `./pieces/${pick.id}/`;
});

document.getElementById('submitBtn').addEventListener('click', () =>
  document.getElementById('submitModal').classList.remove('hidden'));
document.getElementById('closeModal').addEventListener('click', () =>
  document.getElementById('submitModal').classList.add('hidden'));
document.getElementById('submitModal').addEventListener('click', e => {
  if (e.target === document.getElementById('submitModal'))
    document.getElementById('submitModal').classList.add('hidden');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('submitModal').classList.add('hidden');
});

// ── ElectricBorder ───────────────────────────────────────────────────────────
function electricBorder(container, { color = '#5227FF', speed = 1, chaos = 0.12, borderRadius = 4 } = {}) {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:2;display:block;';
  container.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const BO = 60;
  let W, H, timeRef = 0, lastFrame = 0;

  function rnd(x) { return (Math.sin(x * 12.9898) * 43758.5453) % 1; }
  function noise2D(x, y) {
    const i=Math.floor(x),j=Math.floor(y),fx=x-i,fy=y-j;
    const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);
    return rnd(i+j*57)*(1-ux)*(1-uy)+rnd(i+1+j*57)*ux*(1-uy)+
           rnd(i+(j+1)*57)*(1-ux)*uy+rnd(i+1+(j+1)*57)*ux*uy;
  }
  function octNoise(x, t, seed) {
    let y=0,amp=chaos,freq=10;
    for(let i=0;i<10;i++){y+=amp*noise2D(freq*x+seed*100,t*freq*0.3);freq*=1.6;amp*=0.7;}
    return y;
  }
  function corner(cx,cy,r,sa,al,p){const a=sa+p*al;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};}
  function rectPt(t,l,top,w,h,r){
    const sw=w-2*r,sh=h-2*r,ca=Math.PI*r/2,tot=2*sw+2*sh+4*ca;
    let d=t*tot,a=0;
    if(d<=a+sw){const p=(d-a)/sw;return{x:l+r+p*sw,y:top};}a+=sw;
    if(ca>0&&d<=a+ca){const p=(d-a)/ca;return corner(l+w-r,top+r,r,-Math.PI/2,Math.PI/2,p);}a+=ca;
    if(d<=a+sh){const p=(d-a)/sh;return{x:l+w,y:top+r+p*sh};}a+=sh;
    if(ca>0&&d<=a+ca){const p=(d-a)/ca;return corner(l+w-r,top+h-r,r,0,Math.PI/2,p);}a+=ca;
    if(d<=a+sw){const p=(d-a)/sw;return{x:l+w-r-p*sw,y:top+h};}a+=sw;
    if(ca>0&&d<=a+ca){const p=(d-a)/ca;return corner(l+r,top+h-r,r,Math.PI/2,Math.PI/2,p);}a+=ca;
    if(d<=a+sh){const p=(d-a)/sh;return{x:l,y:top+h-r-p*sh};}
    const p=ca>0?(d-a)/ca:0;return corner(l+r,top+r,r,Math.PI,Math.PI/2,p);
  }
  function updateSize() {
    const rect=container.getBoundingClientRect();
    W=rect.width+BO*2;H=rect.height+BO*2;
    const dpr=Math.min(window.devicePixelRatio||1,2);
    canvas.width=W*dpr;canvas.height=H*dpr;
    canvas.style.width=W+'px';canvas.style.height=H+'px';
    ctx.resetTransform();ctx.scale(dpr,dpr);
  }
  function draw(now) {
    timeRef+=((now-lastFrame)/1000)*speed;lastFrame=now;
    const dpr=Math.min(window.devicePixelRatio||1,2);
    ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,canvas.width,canvas.height);ctx.scale(dpr,dpr);
    ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.lineCap='round';ctx.lineJoin='round';
    const l=BO,t=BO,bw=W-BO*2,bh=H-BO*2,r=Math.min(borderRadius,Math.min(bw,bh)/2);
    const samples=Math.floor((2*(bw+bh)+2*Math.PI*r)/2);
    ctx.beginPath();
    for(let i=0;i<=samples;i++){
      const prog=i/samples,pt=rectPt(prog,l,t,bw,bh,r);
      const dx=pt.x+octNoise(prog*8,timeRef,0)*60,dy=pt.y+octNoise(prog*8,timeRef,1)*60;
      i===0?ctx.moveTo(dx,dy):ctx.lineTo(dx,dy);
    }
    ctx.closePath();ctx.stroke();
    requestAnimationFrame(draw);
  }
  updateSize();lastFrame=performance.now();requestAnimationFrame(draw);
  new ResizeObserver(updateSize).observe(container);
}

electricBorder(document.getElementById('manifesto-wrap'), {
  color: '#000', speed: 0.7, chaos: 0.09, borderRadius: 2
});

// ── Magnet effect for footer pill ────────────────────────────────────────────
(function() {
  const bar = document.getElementById('footer-bar');
  const PADDING = 80, STRENGTH = 3;
  let tarX = 0, tarY = 0, curX = 0, curY = 0, raf = null;
  function tick() {
    curX += (tarX - curX) * 0.12;
    curY += (tarY - curY) * 0.12;
    bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
    if (Math.abs(tarX - curX) > 0.05 || Math.abs(tarY - curY) > 0.05) {
      raf = requestAnimationFrame(tick);
    } else {
      curX = tarX; curY = tarY;
      bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
      raf = null;
    }
  }
  window.addEventListener('mousemove', e => {
    const r = bar.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    const dx = e.clientX - cx, dy = e.clientY - cy;
    if (Math.abs(dx) < r.width / 2 + PADDING && Math.abs(dy) < r.height / 2 + PADDING) {
      tarX = dx / STRENGTH; tarY = dy / STRENGTH;
    } else {
      tarX = 0; tarY = 0;
    }
    if (!raf) raf = requestAnimationFrame(tick);
  });
})();
</script>
</body>
</html>
