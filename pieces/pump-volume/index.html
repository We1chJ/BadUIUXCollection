<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pump It Volume! — BAD UI UX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, sans-serif;
    background: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #333;
    user-select: none;
  }

  /* ── Back button ── */
  .back {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; text-decoration: none; color: #000;
    border: 2px solid #000; padding: 6px 12px; box-shadow: 3px 3px 0 #000;
    background: #fff; transition: background 0.15s, color 0.15s;
  }
  .back:hover { background: #000; color: #fff; }

  /* ── Card ── */
  .card { width: 560px; max-width: 90vw; padding: 24px; }
  h1 { font-size: 40px; font-weight: 500; color: #222; margin-bottom: 22px; }
  .sub { font-size: 19px; color: #444; margin-bottom: 28px; }

  /* ── Pump rig ── */
  .rig { display: flex; align-items: flex-start; gap: 28px; margin-bottom: 30px; }

  .pump {
    position: relative;
    width: 90px;
    height: 300px;
    flex-shrink: 0;
  }
  /* piston = T-handle + rod, the draggable part */
  .piston {
    position: absolute;
    left: 17px;
    top: 0;
    width: 56px;
    z-index: 1;
    cursor: grab;
    touch-action: none;
  }
  .piston:active { cursor: grabbing; }
  .t-handle {
    width: 56px; height: 16px; background: #3c3c3c; border-radius: 3px;
  }
  .rod {
    width: 14px; height: 150px; background: #3c3c3c;
    margin: 0 auto; border-radius: 2px;
  }
  .cap {
    position: absolute; left: 8px; bottom: 178px;
    width: 74px; height: 14px; background: #3c3c3c; border-radius: 3px;
    z-index: 2;
  }
  .cylinder {
    position: absolute; left: 13px; bottom: 14px;
    width: 64px; height: 172px; background: #ffe61a; border-radius: 3px;
    z-index: 2;
  }
  .base {
    position: absolute; left: 4px; bottom: 0;
    width: 82px; height: 14px; background: #3c3c3c; border-radius: 3px;
    z-index: 2;
  }
  .hose {
    position: absolute; left: 60px; bottom: 14px;
    z-index: 1; overflow: visible;
  }

  /* ── Gauge (thermometer) ── */
  .gauge {
    position: relative;
    width: 16px; height: 300px;
    background: #ededed; border-radius: 999px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .gauge-fill {
    position: absolute; left: 0; bottom: 0; width: 100%;
    background: #2962ff; border-radius: 999px;
    height: 5%;
  }
  .warn { font-size: 19px; color: #b9b9b9; padding-top: 4px; }

  .readout { font-size: 22px; color: #333; }
  .readout span { font-weight: 500; }

  #footer-bar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 9000; display: flex; align-items: center; gap: 18px;
    padding: 12px 24px;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    font-family: Inter, sans-serif; font-size: 13px; white-space: nowrap; color: #fff;
  }
  #footer-bar a {
    display: inline-flex; align-items: center; gap: 7px;
    color: #fff; text-decoration: none; letter-spacing: 0.03em;
    transition: opacity 0.15s ease;
  }
  #footer-bar a:hover { opacity: 0.65; }
  #footer-bar svg { width: 16px; height: 16px; flex-shrink: 0; }
  .footer-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
  .pill-title { font-weight: 600; letter-spacing: 0.02em; }
  .pill-sin   { color: rgba(255,255,255,0.65); font-style: italic; }
</style>
</head>
<body>

<a class="back" href="../../gallery.html">← Gallery</a>

<div class="card">
  <h1>Pump It Volume!</h1>
  <p class="sub">Keep on pumpin' it!</p>

  <div class="rig">
    <div class="pump">
      <div class="piston" id="piston">
        <div class="t-handle"></div>
        <div class="rod"></div>
      </div>
      <div class="cap"></div>
      <div class="cylinder"></div>
      <div class="base"></div>
      <svg class="hose" width="40" height="170">
        <path d="M2 30 C 34 50, 34 60, 14 90 C -6 120, 30 140, 26 165"
              fill="none" stroke="#3c3c3c" stroke-width="6" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="gauge"><div class="gauge-fill" id="fill"></div></div>

    <p class="warn">Be careful, you could make the leak worse.</p>
  </div>

  <p class="readout">You're volume is at <span id="vol">5</span>%</p>
</div>

<div id="footer-bar">
  <span class="pill-title">Pump It Volume!</span>
  <span class="footer-sep"></span>
  <span class="pill-sin">absurd physical effort for a one-click control — and it leaks</span>
  <span class="footer-sep"></span>
  <a href="https://github.com/We1chJ/BadUIUXCollection" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 4.6 18 4.9 18 4.9c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>
  </a>
</div>

<script>
const piston  = document.getElementById('piston');
const fill    = document.getElementById('fill');
const volEl   = document.getElementById('vol');

const TRAVEL = 90;          // px of vertical handle travel
let handleTop = 0;          // current handle offset (0 = up, TRAVEL = down)
let vol = 5;                // volume %

function render() {
  vol = Math.max(0, Math.min(100, vol));
  fill.style.height = vol + '%';
  volEl.textContent = Math.round(vol);
}

function setHandle(t) {
  handleTop = Math.max(0, Math.min(TRAVEL, t));
  piston.style.top = handleTop + 'px';
}

// ── Drag the handle (vertical only) — down-strokes pump air in ──
let dragging = false, startY = 0, startTop = 0, lastTop = 0;

piston.addEventListener('mousedown', e => {
  dragging = true;
  startY = e.clientY;
  startTop = handleTop;
  lastTop = handleTop;
  piston.style.transition = 'none';
  e.preventDefault();
});

window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const next = startTop + (e.clientY - startY);
  setHandle(next);
  const down = handleTop - lastTop;          // positive = pushing down
  if (down > 0) vol += down * 0.16;          // only down-strokes add volume
  lastTop = handleTop;
  render();
});

window.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  piston.style.transition = 'top 0.12s ease';
});

// ── The leak: smooth continuous drain, worse the fuller it gets ──
let lastT = performance.now();
function tick(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);   // seconds, clamped
  lastT = now;
  vol -= (1.0 + vol * 0.15) * dt;                     // leak rate per second
  render();
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>

<script>
(function () {
  const bar = document.getElementById('footer-bar');
  const PADDING = 80, STRENGTH = 3;
  let tarX = 0, tarY = 0, curX = 0, curY = 0, raf = null;
  function tick() {
    curX += (tarX - curX) * 0.12; curY += (tarY - curY) * 0.12;
    bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
    if (Math.abs(tarX - curX) > 0.05 || Math.abs(tarY - curY) > 0.05) { raf = requestAnimationFrame(tick); }
    else { curX = tarX; curY = tarY; bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`; raf = null; }
  }
  window.addEventListener('mousemove', e => {
    const r = bar.getBoundingClientRect();
    const dx = e.clientX - (r.left + r.width / 2), dy = e.clientY - (r.top + r.height / 2);
    if (Math.abs(dx) < r.width / 2 + PADDING && Math.abs(dy) < r.height / 2 + PADDING) { tarX = dx / STRENGTH; tarY = dy / STRENGTH; }
    else { tarX = 0; tarY = 0; }
    if (!raf) raf = requestAnimationFrame(tick);
  });
})();
</script>
</body>
</html>
