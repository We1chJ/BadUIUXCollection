<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Etch-a-Phone — BAD UI UX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, sans-serif;
    background: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #333;
    user-select: none;
  }

  .back {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; text-decoration: none; color: #000;
    border: 2px solid #000; padding: 6px 12px; box-shadow: 3px 3px 0 #000;
    background: #fff; transition: background 0.15s, color 0.15s;
  }
  .back:hover { background: #000; color: #fff; }

  .card { width: 680px; max-width: 92vw; padding: 24px; }
  h1 { font-size: 42px; font-weight: 500; color: #222; margin-bottom: 24px; }
  .sub { font-size: 20px; color: #333; margin-bottom: 30px; }

  .rig { display: flex; align-items: flex-start; gap: 28px; margin-bottom: 28px; }

  /* ── Etch-a-Sketch device ── */
  .etch {
    width: 320px; background: #ee3322; border-radius: 18px;
    padding: 18px 18px 12px; flex-shrink: 0;
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
  }
  .screen {
    display: block; width: 284px; height: 268px;
    background: #d2d2d2; border-radius: 10px;
    box-shadow: inset 0 0 14px rgba(0,0,0,0.18);
  }
  .dials { display: flex; justify-content: space-between; padding: 12px 6px 2px; }
  .dial {
    width: 62px; height: 62px; border-radius: 50%; cursor: grab;
    background: radial-gradient(circle at 38% 32%, #fff, #d8d8d8 70%, #bdbdbd);
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
    color: rgba(238,51,34,0.55);
  }
  .dial:active { cursor: grabbing; }
  .dial svg { width: 30px; height: 30px; }

  .side-panel { display: flex; flex-direction: column; gap: 16px; padding-top: 6px; }
  .hint { font-size: 18px; color: #bdbdbd; }
  .live-guess { font-size: 22px; color: #b0b0b0; font-style: italic; min-height: 1.6em; }

  /* ── Buttons ── */
  .btns { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 28px; }
  .b {
    font-family: Inter, sans-serif; font-size: 14px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
    padding: 16px 26px; border-radius: 4px; transition: background 0.12s, transform 0.06s;
  }
  .b:active { transform: translateY(1px); }
  .b.primary { color: #fff; background: #59b6e6; border: none; }
  .b.primary:hover { background: #46a8db; }
  .b.ghost { color: #444; background: #fff; border: 1px solid #cfcfcf; }
  .b.ghost:hover { background: #f3f3f3; }

  .readout { font-size: 24px; color: #333; margin-bottom: 22px; }
  .readout .ph { font-variant-numeric: tabular-nums; }

  #footer-bar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 9000; display: flex; align-items: center; gap: 18px;
    padding: 12px 24px;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    font-family: Inter, sans-serif; font-size: 13px; white-space: nowrap; color: #fff;
  }
  #footer-bar a {
    display: inline-flex; align-items: center; gap: 7px;
    color: #fff; text-decoration: none; letter-spacing: 0.03em;
    transition: opacity 0.15s ease;
  }
  #footer-bar a:hover { opacity: 0.65; }
  #footer-bar svg { width: 16px; height: 16px; flex-shrink: 0; }
  .footer-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
  .pill-title { font-weight: 600; letter-spacing: 0.02em; }
  .pill-sin   { color: rgba(255,255,255,0.65); font-style: italic; }
</style>
</head>
<body>

<a class="back" href="../../gallery.html">← Gallery</a>

<div class="card">
  <h1>Etch-a-Phone</h1>
  <p class="sub">Etch your number with OCR!</p>

  <div class="rig">
    <div class="etch">
      <canvas class="screen" id="screen" width="284" height="268"></canvas>
      <div class="dials">
        <div class="dial" id="dialL" title="moves horizontally">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 4 3 9 8 9"/></svg>
        </div>
        <div class="dial" id="dialR" title="moves vertically">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 4 21 9 16 9"/></svg>
        </div>
      </div>
    </div>
    <div class="side-panel">
      <p class="hint">Click and rotate the dials!</p>
      <p class="live-guess" id="live-guess"></p>
    </div>
  </div>

  <div class="btns">
    <button class="b primary" id="submit">Submit Etch</button>
    <button class="b ghost" id="clear">Clear Etch</button>
    <button class="b ghost" id="back">Backspace</button>
  </div>

  <p class="readout">You're number is <span class="ph" id="ph">+1 (___) ____</span></p>

</div>

<div id="footer-bar">
  <span class="pill-title">Etch-a-Phone</span>
  <span class="footer-sep"></span>
  <span class="pill-sin">gating a text field behind one-line handwriting OCR</span>
  <span class="footer-sep"></span>
  <a href="https://github.com/We1chJ/BadUIUXCollection" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 4.6 18 4.9 18 4.9c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>
  </a>
</div>

<script>
// ═══ Etch-a-Sketch screen ═══════════════════════════════════════════════════
const screen = document.getElementById('screen');
const ctx = screen.getContext('2d', { willReadFrequently: true });
const W = screen.width, H = screen.height;

const guessEl = document.getElementById('live-guess');
let lastGuessT = 0;

function clearScreen() {
  ctx.fillStyle = '#d2d2d2';
  ctx.fillRect(0, 0, W, H);
  penX = W / 2; penY = H / 2;
  ctx.fillStyle = '#444';
  ctx.fillRect(penX - 1, penY - 1, 2, 2);
  guessEl.textContent = '';
  lastGuessT = 0;
}
let penX, penY;
function movePen(dx, dy) {
  const nx = Math.max(4, Math.min(W - 4, penX + dx));
  const ny = Math.max(4, Math.min(H - 4, penY + dy));
  ctx.strokeStyle = '#3a3a3a';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(penX, penY);
  ctx.lineTo(nx, ny);
  ctx.stroke();
  penX = nx; penY = ny;
  const now = performance.now();
  if (now - lastGuessT > 120) {
    lastGuessT = now;
    const g = classify();
    guessEl.textContent = g !== null ? `this looks like a ${g}` : '';
  }
}

// ═══ Dials → pen movement (left=X, right=Y) ═════════════════════════════════
const SENS = 48;   // px per radian
function bindDial(el, axis) {
  let dragging = false, lastA = 0, rot = 0;
  const center = () => { const r = el.getBoundingClientRect(); return { x: r.left + r.width / 2, y: r.top + r.height / 2 }; };
  const ang = e => { const c = center(); return Math.atan2(e.clientY - c.y, e.clientX - c.x); };
  el.addEventListener('pointerdown', e => { dragging = true; lastA = ang(e); e.preventDefault(); });
  document.addEventListener('pointermove', e => {
    if (!dragging) return;
    let a = ang(e), d = a - lastA;
    if (d >  Math.PI) d -= 2 * Math.PI;
    if (d < -Math.PI) d += 2 * Math.PI;
    lastA = a; rot += d;
    el.style.transform = `rotate(${rot}rad)`;
    if (axis === 'x') movePen(d * SENS, 0);
    else              movePen(0, d * SENS);
  });
  document.addEventListener('pointerup',     () => { dragging = false; });
  document.addEventListener('pointercancel', () => { dragging = false; });
}
bindDial(document.getElementById('dialL'), 'x');
bindDial(document.getElementById('dialR'), 'y');

// ═══ Digit classifier — multi-template cosine similarity ════════════════════
const G = 28;  // 28×28 feature grid (MNIST-style resolution)

// Extract a normalized G×G ink-vector from a canvas (ink = dark pixels).
function features(srcCanvas) {
  const c = srcCanvas.getContext('2d', { willReadFrequently: true });
  const { width: w, height: h } = srcCanvas;
  const data = c.getImageData(0, 0, w, h).data;
  let minx = w, miny = h, maxx = 0, maxy = 0, any = false;
  for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
    if (data[(y * w + x) * 4] < 160) {
      any = true;
      if (x < minx) minx = x; if (x > maxx) maxx = x;
      if (y < miny) miny = y; if (y > maxy) maxy = y;
    }
  }
  if (!any) return null;
  const bw = maxx - minx + 1, bh = maxy - miny + 1;
  const small = document.createElement('canvas'); small.width = small.height = G;
  const sx = small.getContext('2d', { willReadFrequently: true });
  sx.fillStyle = '#fff'; sx.fillRect(0, 0, G, G);
  const scale = Math.min(G / bw, G / bh) * 0.82;
  const dw = bw * scale, dh = bh * scale;
  sx.drawImage(srcCanvas, minx, miny, bw, bh, (G - dw) / 2, (G - dh) / 2, dw, dh);
  const sd = sx.getImageData(0, 0, G, G).data;
  const vec = new Float32Array(G * G);
  let norm = 0;
  for (let k = 0; k < G * G; k++) { const ink = 1 - sd[k * 4] / 255; vec[k] = ink; norm += ink * ink; }
  norm = Math.sqrt(norm) || 1;
  for (let k = 0; k < vec.length; k++) vec[k] /= norm;
  return vec;
}

// Multiple template variants per digit.
// Stroke-style templates are most similar to single-stroke Etch-a-Sketch drawings.
const templates = (() => {
  const SIZE = 140;
  const tc = document.createElement('canvas'); tc.width = tc.height = SIZE;
  const tx = tc.getContext('2d', { willReadFrequently: true });
  const variants = [
    { font: 'bold 110px Arial, sans-serif',            mode: 'stroke', lw: 6 },
    { font: '110px Arial, sans-serif',                 mode: 'stroke', lw: 5 },
    { font: 'bold 110px "Courier New", monospace',     mode: 'stroke', lw: 6 },
    { font: 'bold 100px Arial, sans-serif',            mode: 'stroke', lw: 8 },
    { font: 'bold 110px Arial, sans-serif',            mode: 'fill'         },
    { font: 'bold 110px "Courier New", monospace',     mode: 'fill'         },
  ];
  const out = Array.from({ length: 10 }, () => []);
  for (const { font, mode, lw } of variants) {
    for (let d = 0; d < 10; d++) {
      tx.fillStyle = '#fff'; tx.fillRect(0, 0, SIZE, SIZE);
      tx.font = font; tx.textAlign = 'center'; tx.textBaseline = 'middle';
      if (mode === 'stroke') {
        tx.strokeStyle = '#000'; tx.lineWidth = lw; tx.strokeText(String(d), SIZE / 2, SIZE / 2 + 4);
      } else {
        tx.fillStyle = '#000'; tx.fillText(String(d), SIZE / 2, SIZE / 2 + 4);
      }
      const vec = features(tc);
      if (vec) out[d].push(vec);
    }
  }
  return out;
})();

function classify() {
  const vec = features(screen);
  if (!vec) return null;
  let best = -1, score = -Infinity;
  templates.forEach((tArr, d) => {
    let maxS = -Infinity;
    for (const t of tArr) {
      let s = 0; for (let k = 0; k < t.length; k++) s += t[k] * vec[k];
      if (s > maxS) maxS = s;
    }
    if (maxS > score) { score = maxS; best = d; }
  });
  return best;
}

// ═══ Phone number assembly ══════════════════════════════════════════════════
let digitsArr = [];
const MAXD = 7;   // (3) + 4, matching the display
const phEl = document.getElementById('ph');
function renderPhone() {
  const d = digitsArr.slice();
  const area = (d.slice(0, 3).join('') + '___').slice(0, 3);
  const line = (d.slice(3, 7).join('') + '____').slice(0, 4);
  phEl.textContent = `+1 (${area}) ${line}`;
}

document.getElementById('submit').addEventListener('click', () => {
  if (digitsArr.length >= MAXD) { clearScreen(); return; }
  const d = classify();
  if (d === null) return;          // nothing drawn
  digitsArr.push(d);
  renderPhone();
  clearScreen();                   // ready for the next digit
});
document.getElementById('clear').addEventListener('click', clearScreen);
document.getElementById('back').addEventListener('click', () => {
  digitsArr.pop(); renderPhone();
});

// boot
clearScreen();
renderPhone();
</script>

<script>
(function () {
  const bar = document.getElementById('footer-bar');
  const PADDING = 80, STRENGTH = 3;
  let tarX = 0, tarY = 0, curX = 0, curY = 0, raf = null;
  function tick() {
    curX += (tarX - curX) * 0.12; curY += (tarY - curY) * 0.12;
    bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
    if (Math.abs(tarX - curX) > 0.05 || Math.abs(tarY - curY) > 0.05) { raf = requestAnimationFrame(tick); }
    else { curX = tarX; curY = tarY; bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`; raf = null; }
  }
  window.addEventListener('mousemove', e => {
    const r = bar.getBoundingClientRect();
    const dx = e.clientX - (r.left + r.width / 2), dy = e.clientY - (r.top + r.height / 2);
    if (Math.abs(dx) < r.width / 2 + PADDING && Math.abs(dy) < r.height / 2 + PADDING) { tarX = dx / STRENGTH; tarY = dy / STRENGTH; }
    else { tarX = 0; tarY = 0; }
    if (!raf) raf = requestAnimationFrame(tick);
  });
})();
</script>
</body>
</html>
