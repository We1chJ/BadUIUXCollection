<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Magnet Unsubscribe — BAD UI UX</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, system-ui, sans-serif;
    background: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #111;
    overflow: hidden;
  }

  /* ── Back button ── */
  .back {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; text-decoration: none; color: #000;
    border: 2px solid #000; padding: 6px 12px; box-shadow: 3px 3px 0 #000;
    background: #fff; transition: background 0.15s, color 0.15s;
  }
  .back:hover { background: #000; color: #fff; }

  /* ── Heading ── */
  .headline {
    position: fixed; top: 22%; left: 50%; transform: translateX(-50%);
    text-align: center; font-size: 38px; font-weight: 800; line-height: 1.3;
    color: #111; pointer-events: none;
  }

  /* ── Fleeing button ── */
  #unsub {
    position: fixed; top: 0; left: 0;
    padding: 18px 34px;
    font-size: 20px; font-weight: 600; color: #fff;
    background: linear-gradient(180deg, #3f7bff 0%, #2f63f0 100%);
    border: none; border-radius: 7px;
    box-shadow: 0 8px 0 #1c47b8, 0 14px 22px rgba(0,0,0,0.28);
    cursor: pointer;
    white-space: nowrap;
    will-change: transform;
  }

  .result {
    position: fixed; top: 62%; left: 50%; transform: translateX(-50%);
    font-size: 20px; font-weight: 600; color: #2f63f0;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .result.show { opacity: 1; }

  /* ── Glass footer pill ── */
  #footer-bar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 9000; display: flex; align-items: center; gap: 18px;
    padding: 12px 24px;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
    font-family: Inter, sans-serif; font-size: 13px; white-space: nowrap; color: #fff;
  }
  #footer-bar a {
    display: inline-flex; align-items: center; gap: 7px;
    color: #fff; text-decoration: none; letter-spacing: 0.03em;
    transition: opacity 0.15s ease;
  }
  #footer-bar a:hover { opacity: 0.65; }
  #footer-bar svg { width: 16px; height: 16px; flex-shrink: 0; }
  .footer-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
  .pill-title { font-weight: 600; letter-spacing: 0.02em; }
  .pill-sin    { color: rgba(255,255,255,0.65); font-style: italic; }
  .pill-credit { color: rgba(255,255,255,0.35); font-size: 11px; }
</style>
</head>
<body>

<a class="back" href="../../gallery.html">← Gallery</a>

<div class="headline">Click below to unsubscribe<br>from our newsletter</div>

<button id="unsub">Unsubscribe</button>

<div class="result" id="result">You actually caught it. Unsubscribed. 😢</div>

<!-- Glass footer pill -->
<div id="footer-bar">
  <span class="pill-title">Magnet Unsubscribe</span>
  <span class="footer-sep"></span>
  <span class="pill-sin">the button repels the cursor and can never be touched</span>
  <span class="footer-sep"></span>
  <span class="pill-credit">made by welchj</span>
  <span class="footer-sep"></span>
  <a href="https://github.com/We1chJ/BadUIUXCollection" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 4.6 18 4.9 18 4.9c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>
  </a>
</div>

<script>
(function () {
  const btn    = document.getElementById('unsub');
  const result = document.getElementById('result');

  const R        = 200;   // repulsion radius (px)
  const STRENGTH = 16;    // push force at point-blank range
  const FRICTION = 0.86;  // velocity damping per frame
  const BOUNCE   = 0.55;  // energy kept on wall hit

  // button center position
  let bx = window.innerWidth * 0.18;
  let by = window.innerHeight * 0.68;
  let vx = 0, vy = 0;
  let mx = -9999, my = -9999;
  let caught = false;

  window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

  function loop() {
    if (caught) return;

    const W = window.innerWidth, H = window.innerHeight;
    const hw = btn.offsetWidth / 2, hh = btn.offsetHeight / 2;

    // repulsion from the cursor — stronger the closer it gets
    const dx = bx - mx, dy = by - my;
    const dist = Math.hypot(dx, dy) || 0.0001;
    if (dist < R) {
      const closeness = (R - dist) / R;        // 0 at edge, 1 point-blank
      const f = closeness * closeness * STRENGTH;  // squared falloff — slams when close
      vx += (dx / dist) * f;
      vy += (dy / dist) * f;
    }

    vx *= FRICTION;
    vy *= FRICTION;
    bx += vx;
    by += vy;

    // bounce off the walls
    if (bx < hw)     { bx = hw;     vx = -vx * BOUNCE; }
    if (bx > W - hw) { bx = W - hw; vx = -vx * BOUNCE; }
    if (by < hh)     { by = hh;     vy = -vy * BOUNCE; }
    if (by > H - hh) { by = H - hh; vy = -vy * BOUNCE; }

    const tilt = Math.max(-18, Math.min(18, vx * 1.4));   // lean into the motion
    btn.style.transform = `translate(${bx - hw}px, ${by - hh}px) rotate(${tilt}deg)`;

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  btn.addEventListener('click', () => {
    caught = true;
    btn.style.display = 'none';
    result.classList.add('show');
  });
})();
</script>

<script>
// Magnet effect (footer pill)
(function () {
  const bar = document.getElementById('footer-bar');
  const PADDING = 80, STRENGTH = 3;
  let tarX = 0, tarY = 0, curX = 0, curY = 0, raf = null;
  function tick() {
    curX += (tarX - curX) * 0.12;
    curY += (tarY - curY) * 0.12;
    bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
    if (Math.abs(tarX - curX) > 0.05 || Math.abs(tarY - curY) > 0.05) {
      raf = requestAnimationFrame(tick);
    } else {
      curX = tarX; curY = tarY;
      bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
      raf = null;
    }
  }
  window.addEventListener('mousemove', e => {
    const r = bar.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    const dx = e.clientX - cx, dy = e.clientY - cy;
    if (Math.abs(dx) < r.width / 2 + PADDING && Math.abs(dy) < r.height / 2 + PADDING) {
      tarX = dx / STRENGTH; tarY = dy / STRENGTH;
    } else { tarX = 0; tarY = 0; }
    if (!raf) raf = requestAnimationFrame(tick);
  });
})();
</script>
</body>
</html>
