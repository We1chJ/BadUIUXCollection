<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dice Volume — BAD UI UX</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, sans-serif;
    background: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #222;
    user-select: none;
  }

  /* ── Back button ── */
  .back {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; text-decoration: none; color: #000;
    border: 2px solid #000; padding: 6px 12px; box-shadow: 3px 3px 0 #000;
    background: #fff; transition: background 0.15s, color 0.15s;
  }
  .back:hover { background: #000; color: #fff; }

  /* ── Panel ── */
  .panel { width: 640px; max-width: 96vw; }

  .grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 10px 12px;
    margin-bottom: 22px;
  }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 5px; }

  .die {
    width: 58px; height: 58px;
    background: #fff;
    border: 2px solid #111;
    border-radius: 8px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    padding: 7px;
    transition: transform 0.05s;
  }
  .die.rolling { transform: scale(1.08) rotate(-3deg); }
  .pip { display: flex; align-items: center; justify-content: center; }
  .pip::after {
    content: ''; width: 10px; height: 10px;
    border-radius: 50%; background: #111;
    opacity: 0; transition: opacity 0.05s;
  }
  .pip.on::after { opacity: 1; }

  .hold {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; color: #555; cursor: pointer;
  }
  .hold input { width: 13px; height: 13px; cursor: pointer; accent-color: #444; }

  /* ── Controls row ── */
  .controls { display: flex; align-items: center; gap: 28px; }
  #roll {
    flex: 1;
    padding: 22px 0;
    background: #ececec;
    border: 1px solid #c4c4c4;
    border-radius: 4px;
    font-size: 22px; font-weight: 700; color: #333;
    cursor: pointer;
    transition: background 0.12s;
  }
  #roll:hover { background: #e0e0e0; }
  #roll:active { background: #d4d4d4; }

  .vol { font-size: 26px; color: #333; white-space: nowrap; }
  .vol b { font-weight: 600; }

  .speaker { width: 52px; height: 52px; flex-shrink: 0; }
  .speaker svg { width: 100%; height: 100%; }

  /* ── Glass footer pill ── */
  #footer-bar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 9000; display: flex; align-items: center; gap: 18px;
    padding: 12px 24px;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
    font-family: Inter, sans-serif; font-size: 13px; white-space: nowrap; color: #fff;
  }
  #footer-bar a {
    display: inline-flex; align-items: center; gap: 7px;
    color: #fff; text-decoration: none; letter-spacing: 0.03em;
    transition: opacity 0.15s ease;
  }
  #footer-bar a:hover { opacity: 0.65; }
  #footer-bar svg { width: 16px; height: 16px; flex-shrink: 0; }
  .footer-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
  .pill-title { font-weight: 600; letter-spacing: 0.02em; }
  .pill-sin    { color: rgba(255,255,255,0.65); font-style: italic; }
  .pill-credit { color: rgba(255,255,255,0.35); font-size: 11px; }
</style>
</head>
<body>

<a class="back" href="../../gallery.html">← Gallery</a>

<div class="panel">
  <div class="grid" id="grid"></div>
  <div class="controls">
    <button id="roll">Roll</button>
    <div class="vol">Volume: <b id="vol">0</b></div>
    <div class="speaker">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 9 H7 L12 4.5 V19.5 L7 15 H3 Z" fill="#111"/>
        <path d="M15.5 8.5 a4.5 4.5 0 0 1 0 7" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M17.5 6 a7.5 7.5 0 0 1 0 12" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
</div>

<!-- Glass footer pill -->
<div id="footer-bar">
  <span class="pill-title">Dice Volume</span>
  <span class="footer-sep"></span>
  <span class="pill-sin">set the volume by rolling sixteen dice and summing them</span>
  <span class="footer-sep"></span>
  <span class="pill-credit">made by welchj</span>
  <span class="footer-sep"></span>
  <a href="https://github.com/We1chJ/BadUIUXCollection" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 4.6 18 4.9 18 4.9c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>
  </a>
</div>

<script>
(function () {
  const N = 16;
  const grid  = document.getElementById('grid');
  const rollBtn = document.getElementById('roll');
  const volEl = document.getElementById('vol');

  // which of the 9 grid positions are lit for each face value
  const PIPS = {
    1: [4],
    2: [0, 8],
    3: [0, 4, 8],
    4: [0, 2, 6, 8],
    5: [0, 2, 4, 6, 8],
    6: [0, 2, 3, 5, 6, 8],
  };

  const dice = [];   // { value, held, dieEl, pipEls, holdInput }

  for (let i = 0; i < N; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';

    const dieEl = document.createElement('div');
    dieEl.className = 'die';
    const pipEls = [];
    for (let p = 0; p < 9; p++) {
      const pip = document.createElement('div');
      pip.className = 'pip';
      dieEl.appendChild(pip);
      pipEls.push(pip);
    }

    const hold = document.createElement('label');
    hold.className = 'hold';
    const holdInput = document.createElement('input');
    holdInput.type = 'checkbox';
    hold.appendChild(holdInput);
    hold.appendChild(document.createTextNode('Hold'));

    cell.appendChild(dieEl);
    cell.appendChild(hold);
    grid.appendChild(cell);

    const d = { value: 1, held: false, dieEl, pipEls, holdInput };
    holdInput.addEventListener('change', () => { d.held = holdInput.checked; });
    dice.push(d);
  }

  function renderDie(d) {
    const on = PIPS[d.value];
    for (let p = 0; p < 9; p++) {
      d.pipEls[p].classList.toggle('on', on.includes(p));
    }
  }

  function updateVolume() {
    let sum = 0;
    for (const d of dice) sum += d.value;
    volEl.textContent = sum;
  }

  let rollTimer = null;
  function roll() {
    if (rollTimer) return;             // ignore clicks mid-roll
    let ticks = 0;
    dice.forEach(d => { if (!d.held) d.dieEl.classList.add('rolling'); });
    rollTimer = setInterval(() => {
      dice.forEach(d => {
        if (d.held) return;
        d.value = 1 + Math.floor(Math.random() * 6);
        renderDie(d);
      });
      updateVolume();
      if (++ticks >= 9) {
        clearInterval(rollTimer);
        rollTimer = null;
        dice.forEach(d => d.dieEl.classList.remove('rolling'));
      }
    }, 45);
  }

  rollBtn.addEventListener('click', roll);

  // initial roll so the panel starts populated
  dice.forEach(d => { d.value = 1 + Math.floor(Math.random() * 6); renderDie(d); });
  updateVolume();
})();
</script>

<script>
// Magnet effect
(function () {
  const bar = document.getElementById('footer-bar');
  const PADDING = 80, STRENGTH = 3;
  let tarX = 0, tarY = 0, curX = 0, curY = 0, raf = null;
  function tick() {
    curX += (tarX - curX) * 0.12;
    curY += (tarY - curY) * 0.12;
    bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
    if (Math.abs(tarX - curX) > 0.05 || Math.abs(tarY - curY) > 0.05) {
      raf = requestAnimationFrame(tick);
    } else {
      curX = tarX; curY = tarY;
      bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
      raf = null;
    }
  }
  window.addEventListener('mousemove', e => {
    const r = bar.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    const dx = e.clientX - cx, dy = e.clientY - cy;
    if (Math.abs(dx) < r.width / 2 + PADDING && Math.abs(dy) < r.height / 2 + PADDING) {
      tarX = dx / STRENGTH; tarY = dy / STRENGTH;
    } else { tarX = 0; tarY = 0; }
    if (!raf) raf = requestAnimationFrame(tick);
  });
})();
</script>
</body>
</html>
