<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Helpful Password — BAD UI UX</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, system-ui, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Back button ── */
  .back {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; text-decoration: none; color: #000;
    border: 2px solid #000; padding: 6px 12px; box-shadow: 3px 3px 0 #000;
    background: #fff; transition: background 0.15s, color 0.15s;
  }
  .back:hover { background: #000; color: #fff; }

  /* ── Card ── */
  #card {
    background: #fff;
    border-radius: 12px;
    padding: 48px 52px 44px;
    width: 460px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  }

  #card h1 {
    font-size: 26px;
    font-weight: 800;
    color: #111;
    line-height: 1.25;
    margin-bottom: 28px;
  }

  /* ── Password input ── */
  #pw-input {
    width: 100%;
    padding: 12px 14px;
    font-size: 22px;
    letter-spacing: 6px;
    border: 2.5px solid #4a90e2;
    border-radius: 6px;
    outline: none;
    color: #222;
    background: #fff;
    transition: border-color 0.15s;
  }
  #pw-input:focus { border-color: #2468c4; }

  /* ── Indicators row ── */
  #indicators {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 6px;
    margin-top: 18px;
    min-height: 46px;
    flex-wrap: wrap;
  }

  .dot {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    transition: transform 0.1s;
  }
  .dot.arrow     { background: #444; font-size: 20px; }
  .dot.ok        { background: #3db552; }
  .dot.misplaced { background: #e6a817; }
  .dot.bad       { background: #e03b3b; }

  /* ── Submit ── */
  #submit-btn {
    margin-top: 24px;
    width: 100%;
    padding: 13px;
    background: #4a90e2;
    color: #fff;
    font-size: 15px; font-weight: 700;
    border: none; border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  #submit-btn:hover { background: #2a6fc4; }

  /* ── Result ── */
  #result {
    display: none;
    margin-top: 16px;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 14px;
    border-radius: 8px;
  }
  #result.success { background: #e6f9ec; color: #1d7a35; display: block; }
  #result.fail    { background: #fdecea; color: #b91c1c; display: block; }

  /* ── Glass footer pill ── */
  #footer-bar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 9000; display: flex; align-items: center; gap: 18px;
    padding: 12px 24px;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    font-family: Inter, sans-serif; font-size: 13px; white-space: nowrap; color: #fff;
  }
  #footer-bar a {
    display: inline-flex; align-items: center; gap: 7px;
    color: #fff; text-decoration: none; letter-spacing: 0.03em;
    transition: opacity 0.15s ease;
  }
  #footer-bar a:hover { opacity: 0.65; }
  #footer-bar svg { width: 16px; height: 16px; flex-shrink: 0; }
  .footer-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
  .pill-title { font-weight: 600; letter-spacing: 0.02em; }
  .pill-sin   { color: rgba(255,255,255,0.65); font-style: italic; }
</style>
</head>
<body>

<a class="back" href="../../gallery.html">← Gallery</a>

<div id="card">
  <h1>Enter your password to proceed</h1>
  <input type="password" id="pw-input" placeholder="" autocomplete="off" spellcheck="false"/>
  <div id="indicators">
    <span class="dot arrow">→</span>
  </div>
  <button id="submit-btn">Submit</button>
  <div id="result"></div>
</div>

<!-- Glass footer pill -->
<div id="footer-bar">
  <span class="pill-title">Helpful Password</span>
  <span class="footer-sep"></span>
  <span class="pill-sin">Reveals correct characters position by position</span>
  <span class="footer-sep"></span>
  <a href="https://github.com/We1chJ/BadUIUXCollection" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 4.6 18 4.9 18 4.9c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>
  </a>
</div>

<script>
(function () {
  const SECRET = 'ilovebaduiux';
  const input = document.getElementById('pw-input');
  const indicators = document.getElementById('indicators');
  const submitBtn = document.getElementById('submit-btn');
  const result = document.getElementById('result');

  input.addEventListener('input', function () {
    const val = input.value;
    let html = '<span class="dot arrow">→</span>';
    for (let i = 0; i < val.length; i++) {
      let cls, sym;
      if (val[i] === SECRET[i]) {
        cls = 'ok'; sym = '✓';
      } else if (SECRET.includes(val[i])) {
        cls = 'misplaced'; sym = '✓';
      } else {
        cls = 'bad'; sym = '✗';
      }
      html += `<span class="dot ${cls}">${sym}</span>`;
    }
    indicators.innerHTML = html;
    result.className = '';
    result.style.display = 'none';
  });

  submitBtn.addEventListener('click', function () {
    if (input.value === SECRET) {
      result.textContent = '✓ Access granted. Welcome!';
      result.className = 'success';
    } else {
      result.textContent = '✗ Incorrect password. (Hint: use the green dots.)';
      result.className = 'fail';
    }
  });

  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') submitBtn.click();
  });
})();
</script>

<script>
// Magnet effect
(function () {
  const bar = document.getElementById('footer-bar');
  const PADDING = 80, STRENGTH = 3;
  let tarX = 0, tarY = 0, curX = 0, curY = 0, raf = null;
  function tick() {
    curX += (tarX - curX) * 0.12;
    curY += (tarY - curY) * 0.12;
    bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
    if (Math.abs(tarX - curX) > 0.05 || Math.abs(tarY - curY) > 0.05) {
      raf = requestAnimationFrame(tick);
    } else {
      curX = tarX; curY = tarY;
      bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
      raf = null;
    }
  }
  window.addEventListener('mousemove', e => {
    const r = bar.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    const dx = e.clientX - cx, dy = e.clientY - cy;
    if (Math.abs(dx) < r.width / 2 + PADDING && Math.abs(dy) < r.height / 2 + PADDING) {
      tarX = dx / STRENGTH; tarY = dy / STRENGTH;
    } else { tarX = 0; tarY = 0; }
    if (!raf) raf = requestAnimationFrame(tick);
  });
})();
</script>
</body>
</html>
