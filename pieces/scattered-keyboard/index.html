<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Scattered Keyboard — BAD UI UX</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, sans-serif;
    background: #0d0d1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: #fff;
  }

  /* ── Back button ── */
  .back {
    position: fixed; top: 16px; left: 16px; z-index: 200;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; text-decoration: none; color: #fff;
    border: 2px solid rgba(255,255,255,0.4); padding: 6px 12px;
    background: transparent; transition: background 0.15s, border-color 0.15s;
  }
  .back:hover { background: rgba(255,255,255,0.1); border-color: #fff; }

  /* ── Glass footer pill ── */
  #footer-bar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 9000; display: flex; align-items: center; gap: 18px;
    padding: 12px 24px;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    font-size: 13px; white-space: nowrap; color: #fff;
  }
  #footer-bar a {
    display: inline-flex; align-items: center; gap: 7px;
    color: #fff; text-decoration: none; letter-spacing: 0.03em;
    transition: opacity 0.15s ease;
  }
  #footer-bar a:hover { opacity: 0.65; }
  #footer-bar svg { width: 16px; height: 16px; flex-shrink: 0; }
  .footer-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
  .pill-title  { font-weight: 600; letter-spacing: 0.02em; }
  .pill-sin    { color: rgba(255,255,255,0.65); font-style: italic; }
  .pill-credit { color: rgba(255,255,255,0.35); font-size: 11px; }

  /* ── Instruction ── */
  #instruction {
    position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
    font-size: 13px; color: rgba(255,255,255,0.6);
    white-space: nowrap; z-index: 100; pointer-events: none;
    letter-spacing: 0.02em;
  }

  /* ── Falling characters ── */
  .faller {
    position: fixed;
    font-family: monospace;
    font-size: 18px;
    color: rgba(255,255,255,0.75);
    width: 24px;
    text-align: center;
    line-height: 1;
    z-index: 20;
    pointer-events: none;
    user-select: none;
  }
  .faller.caught {
    color: #e040fb;
    text-shadow: 0 0 10px rgba(224,64,251,0.9);
    transition: opacity 0.15s;
    opacity: 0;
  }

  /* ── Paddle ── */
  #paddle {
    position: fixed;
    bottom: 60px;
    height: 14px;
    width: 140px;
    background: #e040fb;
    border-radius: 7px;
    box-shadow: 0 0 18px rgba(224,64,251,0.7), 0 0 40px rgba(224,64,251,0.3);
    z-index: 40;
    pointer-events: none;
  }

  /* ── Login form ── */
  .login-form {
    position: relative; z-index: 60;
    background: rgba(13,13,26,0.88);
    border: 1px solid rgba(255,255,255,0.18);
    padding: 36px 32px 32px;
    width: 270px;
  }
  .login-form h2 {
    font-size: 19px; font-weight: 600; text-align: center;
    margin-bottom: 26px; color: #fff;
  }
  .fake-input {
    width: 100%; height: 38px;
    border: 1px solid rgba(255,255,255,0.22);
    background: transparent;
    color: #fff; font-size: 14px; font-family: monospace;
    padding: 0 10px; margin-bottom: 12px;
    display: flex; align-items: center;
    cursor: pointer; overflow: hidden; white-space: nowrap;
    transition: border-color 0.15s;
  }
  .fake-input.active { border-color: #e040fb; }
  .fake-input .caret {
    display: inline-block; width: 1px; height: 14px;
    background: #fff; margin-left: 1px; flex-shrink: 0;
    animation: blink 1s step-end infinite;
  }
  .fake-input.inactive .caret { display: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .login-btn {
    width: 100%; height: 38px; margin-top: 4px;
    border: 1px solid rgba(255,255,255,0.35);
    background: transparent; color: #fff;
    font-size: 13px; font-family: Inter, sans-serif;
    cursor: pointer; transition: background 0.15s;
    letter-spacing: 0.04em;
  }
  .login-btn:hover { background: rgba(255,255,255,0.08); }

  /* ── Success overlay ── */
  #success {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(13,13,26,0.96);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
    font-size: 22px; color: #e040fb;
  }
  #success.show { display: flex; }
  #success p { font-size: 14px; color: rgba(255,255,255,0.45); }
</style>
</head>
<body>

<a class="back" href="../../gallery.html">← Gallery</a>

<div id="instruction">Arrow keys to move the paddle • catch letters to type • ENTER for next field</div>

<!-- Login form (centered by body flex) -->
<div class="login-form">
  <h2>Enter your credentials</h2>
  <div class="fake-input active" id="field-user" onclick="setField('user')">
    <span id="user-text"></span><span class="caret"></span>
  </div>
  <div class="fake-input inactive" id="field-pass" onclick="setField('pass')">
    <span id="pass-text"></span><span class="caret"></span>
  </div>
  <button class="login-btn" onclick="submitLogin()">Login</button>
</div>

<!-- Paddle -->
<div id="paddle"></div>

<!-- Success -->
<div id="success">
  <div>✓ Logged in</div>
  <p>congrats on catching every single letter</p>
</div>

<!-- Glass footer pill -->
<div id="footer-bar">
  <span class="pill-title">Scattered Keyboard</span>
  <span class="footer-sep"></span>
  <span class="pill-sin">UX sin: catch falling letters with a paddle to type</span>
  <span class="footer-sep"></span>
  <span class="pill-credit">via Reddit</span>
  <span class="footer-sep"></span>
  <a href="https://github.com/We1chJ/BadUIUXCollection" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 4.6 18 4.9 18 4.9c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>
  </a>
</div>

<script>
const CHARS = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@._-!⌫'.split('');
const PADDLE_W = 140;
const PADDLE_H = 14;
const PADDLE_BOTTOM = 60;    // CSS bottom value
const CHAR_W = 24;
const CHAR_H = 22;
const PADDLE_SPEED = 380;    // px/s
const FALL_SPEED_MIN = 70;
const FALL_SPEED_MAX = 150;
const MAX_FALLERS = 14;
const SPAWN_INTERVAL_MIN = 500;
const SPAWN_INTERVAL_MAX = 1100;

const paddleEl = document.getElementById('paddle');

let paddleX = (window.innerWidth - PADDLE_W) / 2;
let fallers = [];
let userVal = '';
let passVal = '';
let activeField = 'user';
let leftDown = false;
let rightDown = false;
let lastTime = null;
let nextSpawn = 800;

function paddleTop() {
  return window.innerHeight - PADDLE_BOTTOM - PADDLE_H;
}

function spawnFaller() {
  const char = CHARS[Math.floor(Math.random() * CHARS.length)];
  const x = Math.random() * (window.innerWidth - CHAR_W);
  const speed = FALL_SPEED_MIN + Math.random() * (FALL_SPEED_MAX - FALL_SPEED_MIN);

  const el = document.createElement('div');
  el.className = 'faller';
  el.textContent = char;
  el.style.left = x + 'px';
  el.style.top = '-24px';
  document.body.appendChild(el);

  fallers.push({ char, x, y: -24, speed, el, caught: false });
}

function setField(field) {
  activeField = field;
  document.getElementById('field-user').className = 'fake-input' + (field === 'user' ? ' active' : ' inactive');
  document.getElementById('field-pass').className = 'fake-input' + (field === 'pass' ? ' active' : ' inactive');
}

function renderFields() {
  document.getElementById('user-text').textContent = userVal;
  document.getElementById('pass-text').textContent = '●'.repeat(passVal.length);
}

function appendChar(char) {
  if (char === '⌫') {
    if (activeField === 'user') userVal = userVal.slice(0, -1);
    else passVal = passVal.slice(0, -1);
  } else {
    if (activeField === 'user') userVal += char;
    else passVal += char;
  }
  renderFields();
}

function submitLogin() {
  document.getElementById('success').classList.add('show');
}

function gameLoop(time) {
  requestAnimationFrame(gameLoop);
  if (!lastTime) { lastTime = time; nextSpawn = time + 800; return; }
  const dt = (time - lastTime) / 1000;
  lastTime = time;

  // Move paddle
  if (leftDown)  paddleX = Math.max(0, paddleX - PADDLE_SPEED * dt);
  if (rightDown) paddleX = Math.min(window.innerWidth - PADDLE_W, paddleX + PADDLE_SPEED * dt);
  paddleEl.style.left = paddleX + 'px';

  const pTop = paddleTop();
  const toRemove = [];

  for (const f of fallers) {
    if (f.caught) continue;

    f.y += f.speed * dt;
    f.el.style.top = f.y + 'px';

    // Collision: character bottom crosses paddle top, center-x within paddle
    const charCenterX = f.x + CHAR_W / 2;
    const charBottom = f.y + CHAR_H;

    if (charBottom >= pTop && charBottom <= pTop + PADDLE_H + f.speed * dt + 4) {
      if (charCenterX >= paddleX && charCenterX <= paddleX + PADDLE_W) {
        f.caught = true;
        f.el.classList.add('caught');
        appendChar(f.char);
        setTimeout(() => { f.el.remove(); }, 150);
        toRemove.push(f);
        continue;
      }
    }

    // Off screen
    if (f.y > window.innerHeight + 10) {
      f.el.remove();
      toRemove.push(f);
    }
  }

  fallers = fallers.filter(f => !toRemove.includes(f));

  // Spawn
  if (time >= nextSpawn && fallers.length < MAX_FALLERS) {
    spawnFaller();
    nextSpawn = time + SPAWN_INTERVAL_MIN + Math.random() * (SPAWN_INTERVAL_MAX - SPAWN_INTERVAL_MIN);
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  { e.preventDefault(); leftDown = true; }
  if (e.key === 'ArrowRight') { e.preventDefault(); rightDown = true; }
  if (e.key === 'Enter') {
    e.preventDefault();
    setField(activeField === 'user' ? 'pass' : 'user');
  }
  // Block direct typing
  if (e.key.length === 1) e.preventDefault();
});

document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft')  leftDown = false;
  if (e.key === 'ArrowRight') rightDown = false;
});

requestAnimationFrame(gameLoop);
renderFields();
</script>

<script>
// Magnet effect
(function () {
  const bar = document.getElementById('footer-bar');
  const PADDING = 80, STRENGTH = 3;
  let tarX = 0, tarY = 0, curX = 0, curY = 0, raf = null;
  function tick() {
    curX += (tarX - curX) * 0.12;
    curY += (tarY - curY) * 0.12;
    bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
    if (Math.abs(tarX - curX) > 0.05 || Math.abs(tarY - curY) > 0.05) {
      raf = requestAnimationFrame(tick);
    } else {
      curX = tarX; curY = tarY;
      bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
      raf = null;
    }
  }
  window.addEventListener('mousemove', e => {
    const r = bar.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    const dx = e.clientX - cx, dy = e.clientY - cy;
    if (Math.abs(dx) < r.width / 2 + PADDING && Math.abs(dy) < r.height / 2 + PADDING) {
      tarX = dx / STRENGTH; tarY = dy / STRENGTH;
    } else { tarX = 0; tarY = 0; }
    if (!raf) raf = requestAnimationFrame(tick);
  });
})();
</script>
</body>
</html>
