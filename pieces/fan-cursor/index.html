<!DOCTYPE html>

<title>Fan Cursor Keyboard — BAD UI UX</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, sans-serif;
    background: #e8e8e8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  /* ── Back button ── */
  .back {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; text-decoration: none; color: #000;
    border: 2px solid #000; padding: 6px 12px; box-shadow: 3px 3px 0 #000;
    background: #fff; transition: background 0.15s, color 0.15s;
  }
  .back:hover { background: #000; color: #fff; }

  /* ── Glass footer pill ── */
  #footer-bar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 9000; display: flex; align-items: center; gap: 18px;
    padding: 12px 24px;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    font-size: 13px; white-space: nowrap; color: #fff;
  }
  #footer-bar a {
    display: inline-flex; align-items: center; gap: 7px;
    color: #fff; text-decoration: none; letter-spacing: 0.03em;
    transition: opacity 0.15s ease;
  }
  #footer-bar a:hover { opacity: 0.65; }
  #footer-bar svg.gh { width: 16px; height: 16px; flex-shrink: 0; }
  .footer-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
  .pill-title { font-weight: 600; letter-spacing: 0.02em; }
  .pill-sin    { color: rgba(255,255,255,0.65); font-style: italic; }
  .pill-credit { color: rgba(255,255,255,0.35); font-size: 11px; }

  /* ── Keyboard UI ── */
  .keyboard-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  #text-display {
    width: 500px;
    height: 48px;
    background: #fff;
    border: 2px solid #aaa;
    border-radius: 4px;
    padding: 0 12px;
    font-size: 22px;
    font-family: monospace;
    display: flex;
    align-items: center;
    color: #111;
    overflow: hidden;
    box-shadow: inset 0 1px 4px rgba(0,0,0,0.1);
  }

  #text-display::after {
    content: '|';
    animation: blink 1s step-end infinite;
    color: #555;
    margin-left: 1px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  #keyboard {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    width: 500px;
  }

  .key {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    width: 44px;
    height: 44px;
    background: #d0d0d0;
    border: 1px solid #aaa;
    border-radius: 5px;
    font-size: 14px;
    font-weight: 600;
    color: #222;
    box-shadow: 0 2px 0 #aaa;
    transition: background 0.1s;
  }

  .key.hover {
    background: #888;
    color: #fff;
    box-shadow: 0 1px 0 #666;
    transform: translateY(1px);
  }

  .key.wide {
    width: 96px;
  }

  /* ── Fan & cursor (fixed, over everything) ── */
  #fan {
    position: fixed;
    width: 96px;
    height: 96px;
    cursor: grab;
    z-index: 500;
    top: 0; left: 0;
    transform-origin: center center;
    user-select: none;
    -webkit-user-drag: none;
  }
  #fan:active { cursor: grabbing; }

  #fan-cursor {
    position: fixed;
    width: 24px;
    height: 24px;
    pointer-events: none;
    z-index: 600;
    top: 0; left: 0;
    user-select: none;
    -webkit-user-drag: none;
  }
</style>
</head>
<body>

<div id="footer-bar">
  <span class="pill-title">Fan Cursor Keyboard</span>

  <span class="pill-sin">UX sin: you can't click keys — aim a physics fan at them</span>

  <a href="https://github.com/We1chJ/BadUIUXCollection" target="_blank" rel="noopener">
    <svg class="gh" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 4.6 18 4.9 18 4.9c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>

<script>
const FAN_SPEED = 2;

const textEl       = document.getElementById('text');
const keyElems     = document.getElementsByClassName('key');
const fanEl        = document.getElementById('fan');
const cursorEl     = document.getElementById('fan-cursor');

const fanPos    = { x: 80, y: window.innerHeight / 2 - 40 };
const cursorPos = { x: window.innerWidth / 2 - 12, y: window.innerHeight / 2 - 80 };
const cursorVel = { x: 0, y: 0 };
let fanDragging = false;
let lastKey = null;

fanEl.addEventListener('dragstart', e => e.preventDefault());
fanEl.addEventListener('mousedown', () => fanDragging = true);
document.addEventListener('mouseup', () => fanDragging = false);
document.addEventListener('mouseleave', () => fanDragging = false);

document.addEventListener('mousemove', e => {
  if (!fanDragging) return;
  fanPos.x = e.clientX - fanEl.clientWidth / 2;
  fanPos.y = e.clientY - fanEl.clientHeight / 2;
  fanPos.x = Math.max(-fanEl.clientWidth / 2, Math.min(window.innerWidth  - fanEl.clientWidth  / 2, fanPos.x));
  fanPos.y = Math.max(-fanEl.clientHeight / 2, Math.min(window.innerHeight - fanEl.clientHeight / 2, fanPos.y));
});

function blowCursor(dt) {
  const dx = (cursorPos.x + cursorEl.clientWidth  / 2) - (fanPos.x + fanEl.clientWidth  / 2);
  const dy = (cursorPos.y + cursorEl.clientHeight / 2) - (fanPos.y + fanEl.clientHeight / 2);
  const dist = Math.sqrt(dx * dx + dy * dy) || 1;
  const force = Math.pow(FAN_SPEED / 10, 2) / dist;
  cursorVel.x += force * (dx / dist) * dt;
  cursorVel.y += force * (dy / dist) * dt;
}

function decelerateCursor(dt) {
  const ax = 0.1 * cursorVel.x * cursorVel.x / 2;
  const ay = 0.1 * cursorVel.y * cursorVel.y / 2;
  if (Math.round(cursorVel.x * 1000) === 0) cursorVel.x = 0;
  else cursorVel.x += ax * (cursorVel.x > 0 ? -1 : 1);
  if (Math.round(cursorVel.y * 1000) === 0) cursorVel.y = 0;
  else cursorVel.y += ay * (cursorVel.y > 0 ? -1 : 1);
}

function updateFan() {
  fanEl.style.left = fanPos.x + 'px';
  fanEl.style.top  = fanPos.y + 'px';
  const dx = (cursorPos.x + cursorEl.clientWidth  / 2) - (fanPos.x + fanEl.clientWidth  / 2);
  const dy = (cursorPos.y + cursorEl.clientHeight / 2) - (fanPos.y + fanEl.clientHeight / 2);
  const rot = Math.atan2(dy, dx) * 180 / Math.PI;
  fanEl.style.transform = `rotate(${rot}deg)`;
}

function updateCursor(dt) {
  cursorPos.x += cursorVel.x * dt;
  cursorPos.y += cursorVel.y * dt;
  cursorPos.x = Math.max(0, Math.min(window.innerWidth  - cursorEl.clientWidth,  cursorPos.x));
  cursorPos.y = Math.max(0, Math.min(window.innerHeight - cursorEl.clientHeight, cursorPos.y));
  cursorEl.style.left = cursorPos.x + 'px';
  cursorEl.style.top  = cursorPos.y + 'px';
}

function rectsOverlap(a, b) {
  return a.top < b.bottom && a.bottom > b.top && a.left < b.right && a.right > b.left;
}

function handleCollisions() {
  const cr = cursorEl.getBoundingClientRect();
  for (const key of keyElems) {
    if (rectsOverlap(cr, key.getBoundingClientRect())) {
      if (key === lastKey) return;
      lastKey?.classList.remove('hover');
      lastKey = key;
      key.classList.add('hover');
      if (key.id === 'clear-btn') {
        textEl.textContent = '';
      } else {
        textEl.textContent += key.dataset.key;
      }
      return;
    }
  }
  lastKey?.classList.remove('hover');
  lastKey = null;
}

let lastTime = null;
function loop(time) {
  requestAnimationFrame(loop);
  if (!lastTime) { lastTime = time; return; }
  const dt = time - lastTime;
  lastTime = time;
  blowCursor(dt);
  decelerateCursor(dt);
  updateFan();
  updateCursor(dt);
  handleCollisions();
}
requestAnimationFrame(loop);
</script>

<script>
// Magnet effect
(function () {
  const bar = document.getElementById('footer-bar');
  const PADDING = 80, STRENGTH = 3;
  let tarX = 0, tarY = 0, curX = 0, curY = 0, raf = null;
  function tick() {
    curX += (tarX - curX) * 0.12;
    curY += (tarY - curY) * 0.12;
    bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
    if (Math.abs(tarX - curX) > 0.05 || Math.abs(tarY - curY) > 0.05) {
      raf = requestAnimationFrame(tick);
    } else {
      curX = tarX; curY = tarY;
      bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
      raf = null;
    }
  }
  window.addEventListener('mousemove', e => {
    const r = bar.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    const dx = e.clientX - cx, dy = e.clientY - cy;
    if (Math.abs(dx) < r.width / 2 + PADDING && Math.abs(dy) < r.height / 2 + PADDING) {
      tarX = dx / STRENGTH; tarY = dy / STRENGTH;
    } else { tarX = 0; tarY = 0; }
    if (!raf) raf = requestAnimationFrame(tick);
  });
})();
</script>
