<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Date Slider — BAD UI UX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, sans-serif;
    background: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #333;
    user-select: none;
  }

  /* ── Back button ── */
  .back {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; text-decoration: none; color: #000;
    border: 2px solid #000; padding: 6px 12px; box-shadow: 3px 3px 0 #000;
    background: #fff; transition: background 0.15s, color 0.15s;
  }
  .back:hover { background: #000; color: #fff; }

  /* ── Card ── */
  .card { width: 620px; max-width: 90vw; padding: 24px; }
  h1 { font-size: 44px; font-weight: 500; color: #222; margin-bottom: 30px; }
  .sub { font-size: 22px; color: #333; margin-bottom: 48px; }
  .label { font-size: 17px; font-weight: 700; color: #222; margin-bottom: 18px; }

  .row { display: flex; align-items: center; gap: 24px; }

  /* ── Slider ── */
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    flex: 1;
    height: 6px; border-radius: 999px;
    background: #e2e2e2;
    cursor: pointer;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; border-radius: 50%;
    background: #3b6cf6; border: none; cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%;
    background: #3b6cf6; border: none; cursor: pointer;
  }

  .date {
    font-family: 'Courier New', monospace;
    font-size: 20px; color: #444; white-space: nowrap;
    min-width: 120px;
  }

  #footer-bar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 9000; display: flex; align-items: center; gap: 18px;
    padding: 12px 24px;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    font-family: Inter, sans-serif; font-size: 13px; white-space: nowrap; color: #fff;
  }
  #footer-bar a {
    display: inline-flex; align-items: center; gap: 7px;
    color: #fff; text-decoration: none; letter-spacing: 0.03em;
    transition: opacity 0.15s ease;
  }
  #footer-bar a:hover { opacity: 0.65; }
  #footer-bar svg { width: 16px; height: 16px; flex-shrink: 0; }
  .footer-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
  .pill-title { font-weight: 600; letter-spacing: 0.02em; }
  .pill-sin    { color: rgba(255,255,255,0.65); font-style: italic; }
  .pill-credit { color: rgba(255,255,255,0.35); font-size: 11px; }
</style>
</head>
<body>

<a class="back" href="../../gallery.html">← Gallery</a>

<div class="card">
  <h1>Date Slider</h1>
  <p class="sub">How precise is your mouse?</p>

  <p class="label">Birthday</p>
  <div class="row">
    <input type="range" id="slider"/>
    <span class="date" id="date">1982-01-26</span>
  </div>
</div>

<div id="footer-bar">
  <span class="pill-title">Date Slider</span>
  <span class="footer-sep"></span>
  <span class="pill-sin">a continuous slider for a precise discrete value — one pixel ≈ months</span>
  <span class="footer-sep"></span>
  <span class="pill-credit">made by Reddit</span>
  <span class="footer-sep"></span>
  <a href="https://github.com/We1chJ/BadUIUXCollection" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 4.6 18 4.9 18 4.9c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>
  </a>
</div>

<script>
const slider = document.getElementById('slider');
const dateEl = document.getElementById('date');
const DAY = 86400000;

// Range: 1900-01-01 → today. Each step is one day.
const minDay = Math.floor(Date.UTC(1900, 0, 1) / DAY);
const maxDay = Math.floor(Date.now() / DAY);
const startDay = Math.floor(Date.UTC(1982, 0, 26) / DAY);

slider.min   = minDay;
slider.max   = maxDay;
slider.step  = 1;
slider.value = startDay;

function fmt(day) {
  const d = new Date(day * DAY);
  const y = d.getUTCFullYear();
  const m = String(d.getUTCMonth() + 1).padStart(2, '0');
  const dd = String(d.getUTCDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

function render() {
  const pct = (slider.value - slider.min) / (slider.max - slider.min) * 100;
  slider.style.background =
    `linear-gradient(to right, #3b6cf6 ${pct}%, #e2e2e2 ${pct}%)`;
  dateEl.textContent = fmt(Number(slider.value));
}

slider.addEventListener('input', render);
render();
</script>

<script>
(function () {
  const bar = document.getElementById('footer-bar');
  const PADDING = 80, STRENGTH = 3;
  let tarX = 0, tarY = 0, curX = 0, curY = 0, raf = null;
  function tick() {
    curX += (tarX - curX) * 0.12; curY += (tarY - curY) * 0.12;
    bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
    if (Math.abs(tarX - curX) > 0.05 || Math.abs(tarY - curY) > 0.05) { raf = requestAnimationFrame(tick); }
    else { curX = tarX; curY = tarY; bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`; raf = null; }
  }
  window.addEventListener('mousemove', e => {
    const r = bar.getBoundingClientRect();
    const dx = e.clientX - (r.left + r.width / 2), dy = e.clientY - (r.top + r.height / 2);
    if (Math.abs(dx) < r.width / 2 + PADDING && Math.abs(dy) < r.height / 2 + PADDING) { tarX = dx / STRENGTH; tarY = dy / STRENGTH; }
    else { tarX = 0; tarY = 0; }
    if (!raf) raf = requestAnimationFrame(tick);
  });
})();
</script>
</body>
</html>
