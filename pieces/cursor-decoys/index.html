<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cursor Decoys — BAD UI UX</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, sans-serif;
    background: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: none;
    overflow: hidden;
  }

  /* ── Back button ── */
  .back {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; text-decoration: none; color: #000;
    border: 2px solid #000; padding: 6px 12px; box-shadow: 3px 3px 0 #000;
    background: #fff; transition: background 0.15s, color 0.15s;
    cursor: none;
  }
  .back:hover { background: #000; color: #fff; }

  /* ── Click me button — spawns anywhere, shrinks each click ── */
  #clickme {
    position: fixed;
    left: 170px; top: 130px;
    z-index: 40;
    transform-origin: center;
    padding: 14px 22px;
    background: #b317e0;
    background: linear-gradient(180deg, #c01ff0, #9c0fc9);
    color: #fff;
    font-size: 26px; font-weight: 700;
    border: none; border-radius: 7px;
    cursor: none;
    box-shadow: 0 3px 10px rgba(160,20,210,0.4);
    white-space: nowrap;
    transition: left 0.18s ease, top 0.18s ease, transform 0.18s ease;
  }

  /* ── Cursor layer (real + decoys) ── */
  #cursor-layer {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 9500;
  }
  .cur {
    position: absolute; top: 0; left: 0;
    width: 24px; height: 24px;
    will-change: transform;
  }
  .cur svg { width: 24px; height: 24px; display: block; }

  /* ── Counter ── */
  #counter {
    position: fixed; top: 16px; right: 16px; z-index: 100;
    font-size: 13px; font-weight: 600; color: #888;
    letter-spacing: 0.03em;
  }
  #counter b { color: #b317e0; }

  /* ── Glass footer pill ── */
  #footer-bar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 9000; display: flex; align-items: center; gap: 18px;
    padding: 12px 24px;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    font-family: Inter, sans-serif; font-size: 13px; white-space: nowrap; color: #fff;
    cursor: none;
  }
  #footer-bar a {
    display: inline-flex; align-items: center; gap: 7px;
    color: #fff; text-decoration: none; letter-spacing: 0.03em;
    transition: opacity 0.15s ease;
  }
  #footer-bar a:hover { opacity: 0.65; }
  #footer-bar svg { width: 16px; height: 16px; flex-shrink: 0; }
  .footer-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
  .pill-title { font-weight: 600; letter-spacing: 0.02em; }
  .pill-sin    { color: rgba(255,255,255,0.65); font-style: italic; }
  .pill-credit { color: rgba(255,255,255,0.35); font-size: 11px; }
</style>
</head>
<body>

<a class="back" href="../../gallery.html">← Gallery</a>

<div id="counter">cursors on screen: <b id="count">1</b></div>

<button id="clickme">Click me!</button>

<div id="cursor-layer"></div>

<!-- Glass footer pill -->
<div id="footer-bar">
  <span class="pill-title">Cursor Decoys</span>
  <span class="footer-sep"></span>
  <span class="pill-sin">every click hides your cursor among more identical decoys</span>
  <span class="footer-sep"></span>
  <span class="pill-credit">made by welchj</span>
  <span class="footer-sep"></span>
  <a href="https://github.com/We1chJ/BadUIUXCollection" target="_blank" rel="noopener">

  </a>
</div>

<script>
(function () {
  const layer   = document.getElementById('cursor-layer');
  const btn     = document.getElementById('clickme');
  const countEl = document.getElementById('count');

  const CURSOR_SVG =
    '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' +
    '<path d="M4 2L4 18L8 14L11 21L13.5 20L10.5 13L16 13L4 2Z" ' +
    'fill="#1a1a1a" stroke="#fff" stroke-width="1.1" stroke-linejoin="round"/></svg>';

  let mx = window.innerWidth / 2, my = window.innerHeight / 2;
  const decoys = [];            // { ox, oy, el } — fixed offset from real cursor
  let clicks = 0;
  let scale = 1;

  // The real cursor (drawn identically to every decoy)
  const mainCursor = document.createElement('div');
  mainCursor.className = 'cur';
  mainCursor.innerHTML = CURSOR_SVG;
  layer.appendChild(mainCursor);

  function place() {
    mainCursor.style.transform = `translate(${mx}px, ${my}px)`;
    for (const d of decoys) {
      d.el.style.transform = `translate(${mx + d.ox}px, ${my + d.oy}px)`;
    }
  }

  // Every decoy follows the exact same movement as the real cursor
  document.addEventListener('mousemove', e => {
    mx = e.clientX;
    my = e.clientY;
    place();
  });

  function spawnDecoys(n) {
    const W = window.innerWidth, H = window.innerHeight;
    for (let i = 0; i < n; i++) {
      const el = document.createElement('div');
      el.className = 'cur';
      el.innerHTML = CURSOR_SVG;
      layer.appendChild(el);
      // pick a random absolute spot, store it as a fixed offset from the cursor
      const ox = Math.random() * (W - 30) - mx;
      const oy = Math.random() * (H - 30) - my;
      decoys.push({ ox, oy, el });
    }
    countEl.textContent = decoys.length + 1;   // +1 for the real one
  }

  function moveButton() {
    const W = window.innerWidth, H = window.innerHeight;
    const bw = btn.offsetWidth, bh = btn.offsetHeight;
    const x = 30 + Math.random() * Math.max(1, W - bw - 60);
    const y = 90 + Math.random() * Math.max(1, H - bh - 220);
    btn.style.left = x + 'px';
    btn.style.top  = y + 'px';
  }

  btn.addEventListener('click', () => {
    clicks++;
    scale = Math.max(0.3, scale * 0.92);        // shrink slightly, floor at 30%
    btn.style.transform = `scale(${scale})`;
    spawnDecoys(2 + clicks);                     // escalating batch each click
    moveButton();
  });

  place();
})();
</script>

<script>
// Magnet effect
(function () {
  const bar = document.getElementById('footer-bar');
  const PADDING = 80, STRENGTH = 3;
  let tarX = 0, tarY = 0, curX = 0, curY = 0, raf = null;
  function tick() {
    curX += (tarX - curX) * 0.12;
    curY += (tarY - curY) * 0.12;
    bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
    if (Math.abs(tarX - curX) > 0.05 || Math.abs(tarY - curY) > 0.05) {
      raf = requestAnimationFrame(tick);
    } else {
      curX = tarX; curY = tarY;
      bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
      raf = null;
    }
  }
  window.addEventListener('mousemove', e => {
    const r = bar.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    const dx = e.clientX - cx, dy = e.clientY - cy;
    if (Math.abs(dx) < r.width / 2 + PADDING && Math.abs(dy) < r.height / 2 + PADDING) {
      tarX = dx / STRENGTH; tarY = dy / STRENGTH;
    } else { tarX = 0; tarY = 0; }
    if (!raf) raf = requestAnimationFrame(tick);
  });
})();
</script>
</body>
