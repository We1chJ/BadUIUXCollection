<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Slippery Yes — BAD UI UX</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, system-ui, sans-serif;
    background: #0f1117;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Back button ── */
  .back {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; text-decoration: none; color: #000;
    border: 2px solid #000; padding: 6px 12px; box-shadow: 3px 3px 0 #000;
    background: #fff; transition: background 0.15s, color 0.15s;
  }
  .back:hover { background: #000; color: #fff; }

  /* ── Fake page content behind overlay ── */
  .fake-page {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center;
    padding: 80px 40px;
    filter: blur(3px);
    pointer-events: none;
    user-select: none;
  }
  .fake-page .logo {
    font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; margin-bottom: 40px;
  }
  .fake-page .fake-headline {
    width: 480px; height: 28px; background: rgba(255,255,255,0.12); border-radius: 6px; margin-bottom: 14px;
  }
  .fake-page .fake-body { width: 420px; height: 14px; background: rgba(255,255,255,0.07); border-radius: 4px; margin-bottom: 10px; }
  .fake-page .fake-body.short { width: 300px; }

  /* ── Dim overlay ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
  }

  /* ── Popup ── */
  #popup {
    position: relative; z-index: 10;
    background: #ffffff;
    border-radius: 16px;
    padding: 40px 36px 32px;
    width: 400px;
    text-align: center;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06);
  }

  .popup-icon {
    width: 52px; height: 52px;
    background: #fff3f3;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 24px;
  }

  #popup h2 {
    font-size: 19px; font-weight: 700; color: #111;
    line-height: 1.3; margin-bottom: 10px;
  }

  #popup p {
    font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 28px;
  }

  /* ── Button row ── */
  #btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  #btn-row button {
    flex: 1;
    padding: 12px 0;
    border: none;
    border-radius: 10px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: filter 0.1s;
  }
  #btn-row button:hover { filter: brightness(0.93); }
  #btn-row button:active { filter: brightness(0.85); }

  #btn-yes {
    background: #e53e3e; color: #fff;
  }
  #btn-no {
    background: #f0f0f0; color: #222;
  }

  /* ── Result state ── */
  #result {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  #result .result-icon { font-size: 40px; }
  #result p { font-size: 15px; color: #444; line-height: 1.5; }
  #result.show { display: flex; }
  #popup-body.hide { display: none; }

  /* ── Glass footer pill ── */
  #footer-bar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 9000; display: flex; align-items: center; gap: 18px;
    padding: 12px 24px;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    font-family: Inter, sans-serif; font-size: 13px; white-space: nowrap; color: #fff;
  }
  #footer-bar a {
    display: inline-flex; align-items: center; gap: 7px;
    color: #fff; text-decoration: none; letter-spacing: 0.03em;
    transition: opacity 0.15s ease;
  }
  #footer-bar a:hover { opacity: 0.65; }
  #footer-bar svg { width: 16px; height: 16px; flex-shrink: 0; }
  .footer-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
  .pill-title { font-weight: 600; letter-spacing: 0.02em; }
  .pill-sin { color: rgba(255,255,255,0.65); font-style: italic; }
</style>
</head>
<body>

<a class="back" href="../../gallery.html">← Gallery</a>

<!-- Fake blurred page -->
<div class="fake-page">
  <div class="logo">✉ NewsletterCo</div>
  <div class="fake-headline"></div>
  <div class="fake-body"></div>
  <div class="fake-body short"></div>
  <div class="fake-body"></div>
  <div class="fake-body short"></div>
</div>

<!-- Dim overlay -->
<div class="overlay"></div>

<!-- Popup -->
<div id="popup">
  <div id="popup-body">
    <div class="popup-icon">📧</div>
    <h2>Are you sure you want to unsubscribe?</h2>
    <p>You'll stop receiving our weekly deals, exclusive offers, and curated tips. We'll miss you!</p>
    <div id="btn-row">
      <button id="btn-yes">Yes, unsubscribe</button>
      <button id="btn-no">No, keep me in</button>
    </div>
  </div>
  <div id="result">
    <div class="result-icon">🎉</div>
    <p><strong>You're still subscribed!</strong><br>Great choice. Expect great things in your inbox.</p>
  </div>
</div>

<!-- Glass footer pill -->
<div id="footer-bar">
  <span class="pill-title">Slippery Yes</span>
  <span class="footer-sep"></span>
  <span class="pill-sin">Confirmation button evades the cursor</span>
  <span class="footer-sep"></span>
  <a href="https://github.com/We1chJ/BadUIUXCollection" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 4.6 18 4.9 18 4.9c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>
  </a>
</div>

<script>
(function () {
  const yes = document.getElementById('btn-yes');
  const no = document.getElementById('btn-no');
  const row = document.getElementById('btn-row');
  const popupBody = document.getElementById('popup-body');
  const result = document.getElementById('result');

  let lastSwap = 0;
  const MARGIN = 36;
  const COOLDOWN = 280;

  document.addEventListener('mousemove', function (e) {
    if (Date.now() - lastSwap < COOLDOWN) return;
    const r = yes.getBoundingClientRect();
    const near = e.clientX > r.left - MARGIN && e.clientX < r.right + MARGIN &&
                 e.clientY > r.top - MARGIN && e.clientY < r.bottom + MARGIN;
    if (near) {
      row.classList.toggle('swapped');
      yes.style.order = row.classList.contains('swapped') ? 2 : 0;
      no.style.order  = row.classList.contains('swapped') ? 0 : 2;
      lastSwap = Date.now();
    }
  });

  no.addEventListener('click', function () {
    popupBody.classList.add('hide');
    result.classList.add('show');
  });

  yes.addEventListener('click', function () {
    popupBody.classList.add('hide');
    result.innerHTML = '<div class="result-icon">😢</div><p>You\'ve been unsubscribed.<br><small style="color:#aaa">How did you even do that?</small></p>';
    result.classList.add('show');
  });
})();
</script>

<script>
// Magnet effect
(function () {
  const bar = document.getElementById('footer-bar');
  const PADDING = 80, STRENGTH = 3;
  let tarX = 0, tarY = 0, curX = 0, curY = 0, raf = null;
  function tick() {
    curX += (tarX - curX) * 0.12;
    curY += (tarY - curY) * 0.12;
    bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
    if (Math.abs(tarX - curX) > 0.05 || Math.abs(tarY - curY) > 0.05) {
      raf = requestAnimationFrame(tick);
    } else {
      curX = tarX; curY = tarY;
      bar.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${curY}px)`;
      raf = null;
    }
  }
  window.addEventListener('mousemove', e => {
    const r = bar.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    const dx = e.clientX - cx, dy = e.clientY - cy;
    if (Math.abs(dx) < r.width / 2 + PADDING && Math.abs(dy) < r.height / 2 + PADDING) {
      tarX = dx / STRENGTH; tarY = dy / STRENGTH;
    } else { tarX = 0; tarY = 0; }
    if (!raf) raf = requestAnimationFrame(tick);
  });
})();
</script>
</body>
</html>
